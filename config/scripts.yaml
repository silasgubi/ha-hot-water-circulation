        notification_id: pump_detailed_report
    
    - service: logbook.log
      data:
        name: "📊 Relatório Detalhado Gerado"
        message: "Relatório completo disponível nas notificações"

# 4. CALIBRAÇÃO CORRENTE (NOVO)
pump_calibrate_current:
  alias: "Bomba - Calibração Corrente"
  description: "Testa bomba por 30s e registra estatísticas de corrente"
  mode: single
  icon: mdi:tune
  sequence:
    - service: logbook.log
      data:
        name: "🎯 CALIBRAÇÃO INICIADA"
        message: "Teste de 30 segundos para calibração de corrente"
    
    - service: input_boolean.turn_off
      target:
        entity_id: input_boolean.pump_manual_override
    
    - delay: "00:00:02"
    
    - service: switch.turn_on
      target:
        entity_id: switch.bomba_de_circulacao_de_agua_quente
    
    - service: persistent_notification.create
      data:
        title: "🎯 Calibração em Andamento"
        message: "Bomba ligada por 30s. Aguarde..."
        notification_id: pump_calibration
    
    - delay: "00:00:30"
    
    - service: switch.turn_off
      target:
        entity_id: switch.bomba_de_circulacao_de_agua_quente
    
    - service: persistent_notification.create
      data:
        title: "✅ Calibração Concluída"
        message: >
          **Resultados da calibração:**
          
          Corrente média: {{ states('sensor.bomba_corrente_media') }}A
          Corrente mínima: {{ states('sensor.bomba_corrente_minima') }}A
          Corrente máxima: {{ states('sensor.bomba_corrente_maxima') }}A
          Potência média: {{ states('sensor.bomba_potencia_calculada') }}W
          
          **Thresholds recomendados:**
          Normal min: {{ (states('sensor.bomba_corrente_media') | float * 0.95) | round(3) }}A
          Normal max: {{ (states('sensor.bomba_corrente_media') | float * 1.05) | round(3) }}A
          Alerta baixo: {{ (states('sensor.bomba_corrente_media') | float * 0.80) | round(3) }}A
          Alerta alto: {{ (states('sensor.bomba_corrente_maxima') | float * 1.10) | round(3) }}A
          
          Ajuste manualmente em Configurações se necessário.
        notification_id: pump_calibration
    
    - service: logbook.log
      data:
        name: "🎯 Calibração Completa"
        message: "Média: {{ states('sensor.bomba_corrente_media') }}A | Min: {{ states('sensor.bomba_corrente_minima') }}A | Max: {{ states('sensor.bomba_corrente_maxima') }}A"
