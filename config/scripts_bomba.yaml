  icon: mdi:file-chart
  sequence:
    - service: persistent_notification.create
      data:
        title: "📊 RELATÓRIO DETALHADO - BOMBA v3.5"
        message: >
          **Data/Hora:** {{ now().strftime('%d/%m/%Y %H:%M') }}

          ---

          ## 📈 ESTATÍSTICAS DO DIA

          • Runtime: {{ states('sensor.bomba_runtime_hoje') }}h
          • Timeouts: {{ states('counter.pump_timeout_events') }}
          • Alertas corrente: {{ states('counter.pump_current_alerts') }}

          ---

          ## ⚡ STATUS ATUAL

          • **Bomba:** {{ states('sensor.bomba_status') }}
          • **Sistema:** {{ states('sensor.bomba_sistema_status') }}
          • **Corrente:** {{ states('sensor.bomba_de_circulacao_de_agua_quente_corrente') }}A
          • **Fluxo:** {{ states('valve.hot_water') }}
          • **Funcionando:** {{ states('binary_sensor.bomba_funcionando') }}
          • **Corrente anormal:** {{ states('binary_sensor.bomba_corrente_anormal') }}
          • **Estabilizada:** {{ states('binary_sensor.bomba_corrente_estabilizada') }}
          • **Mudança rápida:** {{ states('binary_sensor.bomba_mudanca_rapida_corrente') }}

          ---

          ## ⚙️ CONFIGURAÇÕES ATUAIS

          • **Delay ligar:** {{ states('input_number.pump_activation_delay_seconds') }}s
          • **Delay desligar:** {{ states('input_number.pump_deactivation_delay_seconds') }}s
          • **Timeout:** {{ states('input_number.pump_timeout_minutes') }}min

          ---

          ## ⚡ THRESHOLDS CORRENTE

          • **Normal:** {{ states('input_number.pump_current_normal_min') }}-{{ states('input_number.pump_current_normal_max') }}A
          • **Crítico:** {{ states('input_number.pump_current_critical_max') }}A
          • **Faixa calibrada:** 0.303-0.323A (1826 medições)

          ---

