          • **Média 24h:** {{ states('sensor.bomba_corrente_media_24h') }}A
          • **Média 7d:** {{ states('sensor.bomba_corrente_media_7d') }}A
          • **Média 30d:** {{ states('sensor.bomba_corrente_media_30d') }}A
          • **Máxima 24h:** {{ states('sensor.bomba_corrente_maxima_24h') }}A

          ---

          ## ⏱️ TIMERS

          • **Activation:** {{ states('timer.pump_activation_delay') }}
          • **Deactivation:** {{ states('timer.pump_deactivation_delay') }}
          • **Safety timeout:** {{ states('timer.pump_safety_timeout') }}

          ---

          ## 🕐 ÚLTIMOS EVENTOS

          • **Último timeout:** {{ states('input_datetime.pump_last_timeout') or 'Nenhum' }}

          ---

          ## 🤖 AUTOMAÇÕES

          • **Controle Principal:** {{ states('automation.bomba_agua_quente_controle_principal') }}
          • **Timeout Segurança:** {{ states('automation.bomba_timeout_seguranca') }}
          • **Controle Manual:** {{ states('automation.bomba_controle_manual') }}
          • **Corrente Crítica:** {{ states('automation.bomba_desligamento_seguranca_corrente') }}
          • **Mudança Rápida:** {{ states('automation.bomba_alerta_mudanca_rapida') }}
          • **Desgaste Emergente:** {{ states('automation.bomba_alerta_desgaste_emergente') }}
        notification_id: pump_detailed_report
