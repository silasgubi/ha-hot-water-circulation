# ╔══════════════════════════════════════════════════════════════════════════════╗
# ║ SENSORS.YAML — HOME ASSISTANT                                              ║
# ║ Include file for !include — REST sensors and platform sensors              ║
# ║ v3.5 — Derivative corrected to detect inrush (~2s window)                 ║
# ╚══════════════════════════════════════════════════════════════════════════════╝

# ================================================
# HISTORY STATS — Daily runtime
# ================================================

- platform: history_stats
  name: "Bomba Runtime Hoje"
  unique_id: bomba_runtime_hoje
  entity_id: switch.bomba_de_circulacao_de_agua_quente
  state: "on"
  type: time
  start: "{{ now().replace(hour=0, minute=0, second=0, microsecond=0) }}"
  end: "{{ now() }}"

# ================================================
# DERIVATIVE — Rate of change (A/s) — v3.5
# ================================================
# Inrush current lasts ~2 seconds (0.35A → 0.31A)
# A 5-SECOND window captures fast transients correctly
# unit_time: s = Amperes per SECOND (not per minute!)

- platform: derivative
  source: sensor.bomba_de_circulacao_de_agua_quente_corrente
  name: "Bomba Taxa Mudança Corrente"
  unique_id: bomba_taxa_mudanca_corrente
  unit_time: s                # v3.5: Amperes per SECOND
  time_window: "00:00:05"     # v3.5: 5-SECOND window
  round: 4

# ================================================
# STATISTICS SENSORS — Long-term analysis
# ================================================

# 24h mean — detects acute problems
- platform: statistics
  name: "Bomba Corrente Média 24h"
  unique_id: bomba_corrente_media_24h
  entity_id: sensor.bomba_de_circulacao_de_agua_quente_corrente
  state_characteristic: mean
  sampling_size: 1000
  max_age:
    hours: 24
  precision: 3

# 24h max — detects recent spikes
- platform: statistics
  name: "Bomba Corrente Máxima 24h"
  unique_id: bomba_corrente_maxima_24h
  entity_id: sensor.bomba_de_circulacao_de_agua_quente_corrente
  state_characteristic: value_max
  sampling_size: 1000
  max_age:
    hours: 24
  precision: 3

# 7d mean — detects emerging trends
- platform: statistics
  name: "Bomba Corrente Média 7d"
  unique_id: bomba_corrente_media_7d
  entity_id: sensor.bomba_de_circulacao_de_agua_quente_corrente
  state_characteristic: mean
  sampling_size: 5000
  max_age:
    days: 7
  precision: 3

# 30d mean — normality baseline for wear comparison
- platform: statistics
  name: "Bomba Corrente Média 30d"
  unique_id: bomba_corrente_media_30d
  entity_id: sensor.bomba_de_circulacao_de_agua_quente_corrente
  state_characteristic: mean
  sampling_size: 10000
  max_age:
    days: 30
  precision: 3


