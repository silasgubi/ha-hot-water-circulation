# ========================================
# INSTRUÇÕES DE CRIAÇÃO
# ========================================

# 1. Acesse: Settings → Devices & Services → Helpers
# 2. Clique em: + CREATE HELPER
# 3. Escolha o tipo (Timer, Toggle, Counter, Date/Time, Number)
# 4. Preencha com as especificações acima
# 5. Repita para todas as 22 entidades

