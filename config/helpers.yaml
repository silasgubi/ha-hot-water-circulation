# PASSO 1: Criar novos helpers de corrente (5)
# - Settings → Devices & Services → Helpers → + CREATE HELPER
# - Escolher "Number" para input_numbers
# - Escolher "Counter" para counter
# - Preencher com especificações acima

# PASSO 2: Aguardar validação do sistema v3.0

# PASSO 3: Remover helpers antigos de potência (4)
# - Settings → Devices & Services → Helpers
# - Buscar cada helper de potência
# - Clicar nos 3 pontinhos → Delete

