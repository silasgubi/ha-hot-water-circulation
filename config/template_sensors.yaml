# ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════
# ROBÔS ASPIRADORES - SISTEMA DE MANUTENÇÃO
# ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════

- sensor:
    # Status geral do Oswaldo
    - name: "Oswaldo Status Manutenção"
      unique_id: oswaldo_status_manutencao
      state: >
        {% set limpezas_atuais = states('sensor.oswaldo_successful_missions') | int %}
        {% set limpezas_na_manutencao = states('counter.oswaldo_successful_missions_na_ultima_manutencao') | int %}
        {% set limpezas_desde_manutencao = limpezas_atuais - limpezas_na_manutencao %}
        {% set limite = states('counter.oswaldo_limite_de_limpezas_para_manutencao') | int %}
        {% if limpezas_desde_manutencao >= limite %}
          Manutenção Necessária
        {% elif limpezas_desde_manutencao >= (limite * 0.8) %}
          Atenção
        {% else %}
          OK
        {% endif %}
      attributes:
        limpezas_realizadas: >
          {% set limpezas_atuais = states('sensor.oswaldo_successful_missions') | int %}
          {% set limpezas_na_manutencao = states('counter.oswaldo_successful_missions_na_ultima_manutencao') | int %}
          {{ limpezas_atuais - limpezas_na_manutencao }}
        limite_configurado: "{{ states('counter.oswaldo_limite_de_limpezas_para_manutencao') | int }}"
        total_missions: "{{ states('sensor.oswaldo_successful_missions') | int }}"
        missions_na_ultima_manutencao: "{{ states('counter.oswaldo_successful_missions_na_ultima_manutencao') | int }}"
        percentual: >
          {% set limpezas_atuais = states('sensor.oswaldo_successful_missions') | int %}
          {% set limpezas_na_manutencao = states('counter.oswaldo_successful_missions_na_ultima_manutencao') | int %}
          {% set limpezas_desde_manutencao = limpezas_atuais - limpezas_na_manutencao %}
          {% set limite = states('counter.oswaldo_limite_de_limpezas_para_manutencao') | int %}
          {{ (limpezas_desde_manutencao / limite * 100) | round(1) if limite > 0 else 0 }}
        dias_desde_manutencao: >
          {% if states('input_datetime.oswaldo_ultima_limpeza_do_compartimento') not in ['unknown', 'unavailable'] %}
            {{ (now() - states('input_datetime.oswaldo_ultima_limpeza_do_compartimento') | as_datetime).days }}
          {% else %}
            Não registrado
          {% endif %}
      icon: >
        {% set limpezas_atuais = states('sensor.oswaldo_successful_missions') | int %}
        {% set limpezas_na_manutencao = states('counter.oswaldo_successful_missions_na_ultima_manutencao') | int %}
        {% set limpezas_desde_manutencao = limpezas_atuais - limpezas_na_manutencao %}
        {% set limite = states('counter.oswaldo_limite_de_limpezas_para_manutencao') | int %}
        {% if limpezas_desde_manutencao >= limite %}
          mdi:robot-vacuum-alert
        {% elif limpezas_desde_manutencao >= (limite * 0.8) %}
          mdi:robot-vacuum
        {% else %}
          mdi:robot-vacuum-variant
        {% endif %}

    # Status do pad da Caroline
    - name: "Caroline Status Pad"
      unique_id: caroline_status_pad
      state: >
        {% set limpezas_atuais = states('sensor.caroline_successful_missions') | int %}
        {% set limpezas_na_troca = states('counter.caroline_successful_missions_na_ultima_troca_pad') | int %}
        {% set limpezas_desde_troca = limpezas_atuais - limpezas_na_troca %}
        {% set limite = states('counter.caroline_limite_de_limpezas_para_trocar_pad') | int %}
        {% if limpezas_desde_troca >= limite %}
          Trocar Pad
        {% elif limpezas_desde_troca >= (limite * 0.8) %}
          Atenção
        {% else %}
          OK
        {% endif %}
      attributes:
        limpezas_realizadas: >
          {% set limpezas_atuais = states('sensor.caroline_successful_missions') | int %}
          {% set limpezas_na_troca = states('counter.caroline_successful_missions_na_ultima_troca_pad') | int %}
          {{ limpezas_atuais - limpezas_na_troca }}
        limite_configurado: "{{ states('counter.caroline_limite_de_limpezas_para_trocar_pad') | int }}"
        total_missions: "{{ states('sensor.caroline_successful_missions') | int }}"
        missions_na_ultima_troca: "{{ states('counter.caroline_successful_missions_na_ultima_troca_pad') | int }}"
        percentual: >
          {% set limpezas_atuais = states('sensor.caroline_successful_missions') | int %}
          {% set limpezas_na_troca = states('counter.caroline_successful_missions_na_ultima_troca_pad') | int %}
          {% set limpezas_desde_troca = limpezas_atuais - limpezas_na_troca %}
          {% set limite = states('counter.caroline_limite_de_limpezas_para_trocar_pad') | int %}
          {{ (limpezas_desde_troca / limite * 100) | round(1) if limite > 0 else 0 }}
        dias_desde_troca: >
          {% if states('input_datetime.caroline_ultima_troca_do_pad') not in ['unknown', 'unavailable'] %}
            {{ (now() - states('input_datetime.caroline_ultima_troca_do_pad') | as_datetime).days }}
          {% else %}
            Não registrado
          {% endif %}
      icon: >
        {% set limpezas_atuais = states('sensor.caroline_successful_missions') | int %}
        {% set limpezas_na_troca = states('counter.caroline_successful_missions_na_ultima_troca_pad') | int %}
        {% set limpezas_desde_troca = limpezas_atuais - limpezas_na_troca %}
        {% set limite = states('counter.caroline_limite_de_limpezas_para_trocar_pad') | int %}
        {% if limpezas_desde_troca >= limite %}
          mdi:spray-bottle
        {% elif limpezas_desde_troca >= (limite * 0.8) %}
          mdi:spray
        {% else %}
          mdi:check-circle
        {% endif %}

    # Status da água da Caroline
    - name: "Caroline Status Água"
      unique_id: caroline_status_agua
      state: >
        {% set limpezas_atuais = states('sensor.caroline_successful_missions') | int %}
        {% set limpezas_no_reabastecimento = states('counter.caroline_successful_missions_no_ultimo_reabastecimento') | int %}
        {% set limpezas_desde_agua = limpezas_atuais - limpezas_no_reabastecimento %}
        {% set limite_agua = states('counter.caroline_limite_de_limpezas_para_agua') | int %}
        {% if limpezas_desde_agua >= limite_agua %}
          Adicionar Água
        {% elif limpezas_desde_agua >= (limite_agua * 0.8) %}
          Atenção
        {% else %}
          OK
        {% endif %}
      attributes:
        limpezas_desde_agua: >
          {% set limpezas_atuais = states('sensor.caroline_successful_missions') | int %}
          {% set limpezas_no_reabastecimento = states('counter.caroline_successful_missions_no_ultimo_reabastecimento') | int %}
          {{ limpezas_atuais - limpezas_no_reabastecimento }}
        total_missions: "{{ states('sensor.caroline_successful_missions') | int }}"
        missions_no_ultimo_reabastecimento: "{{ states('counter.caroline_successful_missions_no_ultimo_reabastecimento') | int }}"
        proximo_reabastecimento: >
          {% set limpezas_atuais = states('sensor.caroline_successful_missions') | int %}
          {% set limpezas_no_reabastecimento = states('counter.caroline_successful_missions_no_ultimo_reabastecimento') | int %}
          {% set limpezas_desde_agua = limpezas_atuais - limpezas_no_reabastecimento %}
          {{ 2 - limpezas_desde_agua if limpezas_desde_agua < 2 else 0 }}
        dias_desde_agua: >
          {% if states('input_datetime.caroline_ultima_adicao_de_agua') not in ['unknown', 'unavailable'] %}
            {{ (now() - states('input_datetime.caroline_ultima_adicao_de_agua') | as_datetime).days }}
          {% else %}
            Não registrado
          {% endif %}
      icon: >
        {% set limpezas_atuais = states('sensor.caroline_successful_missions') | int %}
        {% set limpezas_no_reabastecimento = states('counter.caroline_successful_missions_no_ultimo_reabastecimento') | int %}
        {% set limpezas_desde_agua = limpezas_atuais - limpezas_no_reabastecimento %}
        {% if limpezas_desde_agua >= 2 %}
          mdi:water-alert
        {% elif limpezas_desde_agua >= 1 %}
          mdi:water
        {% else %}
          mdi:water-check
        {% endif %}

    # Resumo geral dos robôs
    - name: "Robôs Status Geral"
      unique_id: robos_status_geral
      state: >
        {% set oswaldo = states('sensor.oswaldo_status_manutencao') %}
        {% set caroline_pad = states('sensor.caroline_status_pad') %}
        {% set caroline_agua = states('sensor.caroline_status_agua') %}
        {% if oswaldo == 'Manutenção Necessária' or caroline_pad == 'Trocar Pad' or caroline_agua == 'Adicionar Água' %}
          Manutenção Pendente
        {% elif oswaldo == 'Atenção' or caroline_pad == 'Atenção' or caroline_agua == 'Atenção' %}
          Atenção
        {% else %}
          Tudo OK
        {% endif %}
      icon: >
        {% set oswaldo = states('sensor.oswaldo_status_manutencao') %}
        {% set caroline_pad = states('sensor.caroline_status_pad') %}
        {% set caroline_agua = states('sensor.caroline_status_agua') %}
        {% if oswaldo == 'Manutenção Necessária' or caroline_pad == 'Trocar Pad' or caroline_agua == 'Adicionar Água' %}
          mdi:alert-circle
        {% elif oswaldo == 'Atenção' or caroline_pad == 'Atenção' or caroline_agua == 'Atenção' %}
          mdi:alert-circle-outline
        {% else %}
          mdi:check-circle
        {% endif %}
      attributes:
        oswaldo: "{{ states('sensor.oswaldo_status_manutencao') }}"
        caroline_pad: "{{ states('sensor.caroline_status_pad') }}"
        caroline_agua: "{{ states('sensor.caroline_status_agua') }}"

# ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════
# SISTEMA DE IRRIGAÇÃO - SENSORES DE CONTROLE E MONITORAMENTO
# ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════

- sensor:
    # Calcular ciclo atual (baseado em quanto tempo já passou desde início)
    - name: "Rega Ciclo Atual"
      unique_id: rega_ciclo_atual
      state: >
        {% set offset = states('input_number.rega_offset_ciclos') | int(0) %}
        {% set ciclos = states('counter.rega_ciclos_executados') | int(0) %}
        {{ ciclos + offset + 1 }}
      icon: mdi:numeric

    # Timer em segundos para o ciclo
    - name: "Rega Timer Ciclo"
      unique_id: rega_timer_ciclo
      unit_of_measurement: "s"
      state: >
        {% set inicio = states('input_datetime.rega_inicio_ciclo') %}
        {% if inicio not in ['unknown', 'unavailable', ''] %}
          {% set seconds = (now() - (inicio | as_datetime)).total_seconds() | int %}
          {{ [seconds, 0] | max }}
        {% else %}
          0
        {% endif %}
      icon: mdi:timer

    # Próxima ação prevista
    - name: "Rega Próxima Ação"
      unique_id: rega_proxima_acao
      state: >
        {% if is_state('input_boolean.rega_em_andamento', 'on') %}
          {% set timer = states('sensor.rega_timer_ciclo') | int(0) %}
          {% set bomba_on = is_state('switch.sonoff_100247d000', 'on') %}
          {% set tempo_on = states('input_number.rega_tempo_on') | int(60) %}
          {% set tempo_off = states('input_number.rega_tempo_off') | int(120) %}
          {% if bomba_on %}
            {% set restante = tempo_on - timer %}
            Desligar em {{ restante }}s
          {% else %}
            {% set restante = tempo_off - timer %}
            Ligar em {{ restante }}s
          {% endif %}
        {% else %}
          Sistema Parado
        {% endif %}
      icon: mdi:timer-cog

    # Progresso visual
    - name: "Rega Progresso"
      unique_id: rega_progresso
      unit_of_measurement: "%"
      state: >
        {% if is_state('input_boolean.rega_em_andamento', 'on') %}
          {% set ciclo_atual = states('sensor.rega_ciclo_atual') | int(1) %}
          {% set ciclos_total = states('input_number.rega_numero_ciclos') | int(1) %}
          {{ ((ciclo_atual - 1) / ciclos_total * 100) | round(0) }}
        {% else %}
          0
        {% endif %}
      icon: mdi:progress-clock

    # Monitor detalhado do sistema
    - name: "Rega Status Sistema"
      unique_id: rega_status_sistema
      state: >
        {% if is_state('input_boolean.rega_em_andamento', 'on') %}
          {% set bomba_on = is_state('switch.sonoff_100247d000', 'on') %}
          {% set timer = states('sensor.rega_timer_ciclo') | int(0) %}
          {% set tempo_on = states('input_number.rega_tempo_on') | int(60) %}
          {% set tempo_off = states('input_number.rega_tempo_off') | int(120) %}
          {% if bomba_on %}
            Irrigando ({{ timer }}s/{{ tempo_on }}s)
          {% else %}
            Aguardando ({{ timer }}s/{{ tempo_off }}s)
          {% endif %}
        {% else %}
          Parado
        {% endif %}
      icon: >
        {% if is_state('input_boolean.rega_em_andamento', 'on') %}
          {% if is_state('switch.sonoff_100247d000', 'on') %}
            mdi:water-pump
          {% else %}
            mdi:timer-sand
          {% endif %}
        {% else %}
          mdi:power
        {% endif %}
      attributes:
        ciclo_atual: "{{ states('sensor.rega_ciclo_atual') }}"
        ciclos_total: "{{ states('input_number.rega_numero_ciclos') | int }}"
        progresso: "{{ states('sensor.rega_progresso') }}%"
        timer: "{{ states('sensor.rega_timer_ciclo') }}s"
        bomba_ligada: "{{ is_state('switch.sonoff_100247d000', 'on') }}"
        tempo_on_config: "{{ states('input_number.rega_tempo_on') | int }}s"
        tempo_off_config: "{{ states('input_number.rega_tempo_off') | int }}s"
        inicio_ciclo: "{{ states('input_datetime.rega_inicio_ciclo') }}"
        proximo_passo: "{{ states('sensor.rega_proxima_acao') }}"

- binary_sensor:
    # Detector de problema no sistema
    - name: "Rega Sistema Travado"
      unique_id: rega_sistema_travado
      device_class: problem
      state: >
        {% set timer = states('sensor.rega_timer_ciclo') | int(0) %}
        {% set limite = states('input_number.rega_tempo_off') | int(120) %}
        {{ is_state('input_boolean.rega_em_andamento', 'on') and 
           is_state('switch.sonoff_100247d000', 'off') and 
           timer > limite + 10 }}
      icon: >
        {% if is_state('binary_sensor.rega_sistema_travado', 'on') %}
          mdi:alert-circle
        {% else %}
          mdi:check-circle
        {% endif %}
      attributes:
        timer_atual: "{{ states('sensor.rega_timer_ciclo') }}s"
        limite_esperado: >
          {{ states('input_number.rega_tempo_off') | int }}s
        diferenca: >
          {% set timer = states('sensor.rega_timer_ciclo') | int(0) %}
          {% set limite = states('input_number.rega_tempo_off') | int(120) %}
          {{ max - atual }}
        sistema_travado: >
          {% set timer = states('sensor.rega_timer_ciclo') | int(0) %}
          {% set limite = states('input_number.rega_tempo_off') | int(120) %}
          {{ is_state('input_boolean.rega_em_andamento', 'on') and 
             is_state('switch.sonoff_100247d000', 'off') and 
             timer > limite + 10 }}

# ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════
# UPS PROTECTION SYSTEM - SENSORES DE MONITORAMENTO
# ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════

# ╔══════════════════════════════════════════════════════════════════════════════════╗
# ║                    HOME ASSISTANT UPS PROTECTION SYSTEM                         ║
# ║                            TEMPLATE_SENSORS.YAML                                ║
# ╚══════════════════════════════════════════════════════════════════════════════════╝

# Binary Sensor Principal - Detector de Falta de Energia

- binary_sensor:
    - name: "UPS Falta de Energia"
      unique_id: ups_falta_de_energia
      device_class: problem
      delay_on: "00:02:00" # Confirma falta por 2min (filtra micro-interrupções)
      delay_off: "00:01:00" # Normaliza após 1min de voltagem OK
      state: >
        {% set threshold = states('input_number.ups_threshold_voltagem') | float(100) %}
        {% set voltagem = states('sensor.bomba_de_circulacao_de_agua_quente_voltagem') | float(999) %}
        {{ voltagem < threshold }}
      icon: >
        {% if is_state('binary_sensor.ups_falta_de_energia', 'on') %}
          mdi:power-plug-off
        {% else %}
          mdi:power-plug
        {% endif %}
      attributes:
        voltagem_atual: >
          {{ states('sensor.bomba_de_circulacao_de_agua_quente_voltagem') | float(0) | round(1) }}
        threshold_configurado: >
          {{ states('input_number.ups_threshold_voltagem') | float(100) | round(0) }}
        status: >
          {% set v = states('sensor.bomba_de_circulacao_de_agua_quente_voltagem') | float(0) %}
          {% if v == 0 %}
            Sem energia
          {% elif v < 100 %}
            Crítico ({{ v | round(1) }}V)
          {% elif v < 200 %}
            Baixo ({{ v | round(1) }}V)
          {% elif v < 210 %}
            Queda leve ({{ v | round(1) }}V)
          {% else %}
            Normal ({{ v | round(1) }}V)
          {% endif %}

# Sensors Auxiliares
- sensor:
    # Monitor de Voltagem da Rede
    - name: "UPS Voltagem da Rede"
      unique_id: ups_voltagem_rede
      state: >
        {{ states('sensor.bomba_de_circulacao_de_agua_quente_voltagem') | float(0) | round(1) }}
      unit_of_measurement: "V"
      device_class: voltage
      state_class: measurement
      icon: >
        {% set v = this.state | float %}
        {% if v == 0 %}
          mdi:lightning-bolt-outline
        {% elif v < 100 %}
          mdi:alert-circle
        {% elif v < 200 %}
          mdi:alert
        {% elif v < 210 %}
          mdi:alert-circle-outline
        {% else %}
          mdi:lightning-bolt
        {% endif %}
      attributes:
        classificacao: >
          {% set v = this.state | float %}
          {% if v == 0 %}
            Sem energia
          {% elif v < 100 %}
            Crítico
          {% elif v < 200 %}
            Baixo
          {% elif v < 210 %}
            Queda leve
          {% else %}
            Normal
          {% endif %}
        percentual_nominal: >
          {% set v = this.state | float %}
          {% if v > 0 %}
            {{ ((v / 220) * 100) | round(1) }}%
          {% else %}
            0%
          {% endif %}
        sensor_origem: sensor.bomba_de_circulacao_de_agua_quente_voltagem

    # Tempo Restante até Shutdown
    - name: "UPS Tempo Restante Shutdown"
      unique_id: ups_tempo_restante_shutdown
      state: >
        {% if is_state('input_boolean.ups_shutdown_armed', 'on') %}
          {% set shutdown_time = states('input_datetime.ups_shutdown_time') %}
          {% if shutdown_time not in ['unknown', 'unavailable', ''] %}
            {% set remaining = (as_timestamp(shutdown_time) - as_timestamp(now())) / 60 %}
            {{ [remaining, 0] | max | round }}
          {% else %}
            0
          {% endif %}
        {% else %}
          0
        {% endif %}
      unit_of_measurement: "min"
      icon: mdi:timer-outline
      attributes:
        shutdown_programado: >
          {% if is_state('input_boolean.ups_shutdown_armed', 'on') %}
            {{ states('input_datetime.ups_shutdown_time') }}
          {% else %}
            Não programado
          {% endif %}

    # Status Geral do Sistema
    - name: "UPS Status Sistema"
      unique_id: ups_status_sistema
      state: >
        {% set falta = is_state('binary_sensor.ups_falta_de_energia', 'on') %}
        {% set armed = is_state('input_boolean.ups_shutdown_armed', 'on') %}
        {% set tempo = states('sensor.ups_tempo_restante_shutdown') | int(0) %}
        {% if falta and armed and tempo > 0 %}
          🚨 Shutdown em {{ tempo }}min
        {% elif falta and armed %}
          🚨 Executando shutdown
        {% elif falta %}
          ⚠️ Falta detectada (confirmando)
        {% elif armed %}
          ⏰ Sistema armado (energia restaurada)
        {% else %}
          ✅ Normal
        {% endif %}
      icon: >
        {% set falta = is_state('binary_sensor.ups_falta_de_energia', 'on') %}
        {% set armed = is_state('input_boolean.ups_shutdown_armed', 'on') %}
        {% if falta and armed %}
          mdi:alert-octagon
        {% elif falta %}
          mdi:alert
        {% elif armed %}
          mdi:clock-alert
        {% else %}
          mdi:check-circle
        {% endif %}
      attributes:
        falta_energia: >
          {{ is_state('binary_sensor.ups_falta_de_energia', 'on') }}
        sistema_armado: >
          {{ is_state('input_boolean.ups_shutdown_armed', 'on') }}
        voltagem_atual: >
          {{ states('sensor.ups_voltagem_rede') }}V


# ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════
# BOMBA ÁGUA QUENTE - SISTEMA DE AUTOMAÇÃO v3.5 DERIVATIVE
# ═══════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════════
# Arquitetura v3.5: Derivative (dI/dt) distingue inrush de problemas reais
# Thresholds calibrados: 1826 amostras dezembro (99.8% cobertura)
# - Normal: 0.303-0.323A
# - Crítico: 0.388A (max × 1.15)
# - Estabilização: |dI/dt| < 0.005 A/s por 2s
# - Mudança rápida: |dI/dt| > 0.010 A/s

- sensor:
    # Status da Bomba (baseado em CORRENTE)
    - name: "Bomba Status"
      unique_id: bomba_status
      state: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
        {% if corrente >= min_corrente %}
          Funcionando
        {% elif states('switch.bomba_de_circulacao_de_agua_quente') == 'on' %}
          Ligada sem carga
        {% else %}
          Desligada
        {% endif %}
      icon: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
        {% if corrente >= min_corrente %}
          mdi:pump
        {% elif states('switch.bomba_de_circulacao_de_agua_quente') == 'on' %}
          mdi:pump-off
        {% else %}
          mdi:pump-off
        {% endif %}

    # Status Simplificado do Sistema
    - name: "Bomba Sistema Status"
      unique_id: bomba_sistema_status
      state: >
        {% set override = states('input_boolean.pump_manual_override') %}
        {% set pump_on = states('switch.bomba_de_circulacao_de_agua_quente') %}
        {% set timeout_active = states('timer.pump_safety_timeout') %}

        {% if override == 'on' %}
          Manual
        {% elif timeout_active == 'active' and pump_on == 'on' %}
          Funcionando
        {% elif pump_on == 'on' %}
          Ativo
        {% else %}
          Standby
        {% endif %}
      icon: mdi:information-outline

    # Runtime Hoje - REMOVIDO (usar history_stats ao invés de template complexo)
    # Ver sensors.yaml para sensor.bomba_runtime_hoje via history_stats

- binary_sensor:
    # ================================================
    # CAMADA 2a: Corrente Estabilizada (v3.5)
    # ================================================
    # Detecta quando corrente está estável (inrush passou)
    # |dI/dt| < 0.005 A/s por 2 segundos = estabilizado
    - name: "Bomba Corrente Estabilizada"
      unique_id: bomba_corrente_estabilizada
      device_class: running
      delay_on: "00:00:02"   # 2s consecutivos estável = confirmado
      state: >
        {% set taxa = states('sensor.bomba_taxa_mudanca_corrente') | float(0) %}
        {% set pump_on = states('switch.bomba_de_circulacao_de_agua_quente') == 'on' %}
        {% set threshold_estabilizacao = 0.005 %}
        {{ pump_on and (taxa | abs) < threshold_estabilizacao }}
      icon: >
        {% if is_state('binary_sensor.bomba_corrente_estabilizada', 'on') %}
          mdi:sine-wave
        {% else %}
          mdi:wave
        {% endif %}
      attributes:
        taxa_atual: >
          {{ states('sensor.bomba_taxa_mudanca_corrente') | float(0) | round(4) }}
        threshold_estabilizacao: "0.005 A/s"
        status: >
          {% set taxa = states('sensor.bomba_taxa_mudanca_corrente') | float(0) %}
          {% if (taxa | abs) < 0.005 %}
            Estável
          {% elif (taxa | abs) < 0.010 %}
            Variando
          {% else %}
            Mudança rápida
          {% endif %}

    # ================================================
    # CAMADA 2b: Mudança Rápida de Corrente (v3.5)
    # ================================================
    # Detecta variação brusca (problema agudo, não inrush)
    # |dI/dt| > 0.010 A/s = mudança rápida
    - name: "Bomba Mudança Rápida Corrente"
      unique_id: bomba_mudanca_rapida_corrente
      device_class: problem
      state: >
        {% set taxa = states('sensor.bomba_taxa_mudanca_corrente') | float(0) %}
        {% set pump_on = states('switch.bomba_de_circulacao_de_agua_quente') == 'on' %}
        {% set threshold_rapida = 0.010 %}
        {{ pump_on and (taxa | abs) > threshold_rapida }}
      icon: >
        {% if is_state('binary_sensor.bomba_mudanca_rapida_corrente', 'on') %}
          mdi:lightning-bolt
        {% else %}
          mdi:lightning-bolt-outline
        {% endif %}
      attributes:
        taxa_atual: >
          {{ states('sensor.bomba_taxa_mudanca_corrente') | float(0) | round(4) }}
        threshold_mudanca_rapida: "0.010 A/s"
        direcao: >
          {% set taxa = states('sensor.bomba_taxa_mudanca_corrente') | float(0) %}
          {% if taxa > 0.010 %}
            Subindo ↑
          {% elif taxa < -0.010 %}
            Descendo ↓
          {% else %}
            Estável →
          {% endif %}

    # ================================================
    # CAMADA 2c: Desgaste Emergente (v3.5)
    # ================================================
    # Detecta tendência de crescimento (7d vs 30d)
    # média_7d > média_30d × 1.03 OU média_7d > max × 0.95
    - name: "Bomba Desgaste Emergente"
      unique_id: bomba_desgaste_emergente
      device_class: problem
      state: >
        {% set media_7d = states('sensor.bomba_corrente_media_7d') | float(0) %}
        {% set media_30d = states('sensor.bomba_corrente_media_30d') | float(0) %}
        {% set max_corrente = states('input_number.pump_current_normal_max') | float(0.323) %}
        {% set crescimento_threshold = 1.03 %}
        {% set margem_critico = 0.95 %}
        
        {% if media_30d > 0 %}
          {{ media_7d > (media_30d * crescimento_threshold) or media_7d > (max_corrente * margem_critico) }}
        {% else %}
          false
        {% endif %}
      icon: >
        {% if is_state('binary_sensor.bomba_desgaste_emergente', 'on') %}
          mdi:trending-up
        {% else %}
          mdi:trending-neutral
        {% endif %}
      attributes:
        media_7d: >
          {{ states('sensor.bomba_corrente_media_7d') | float(0) | round(3) }}
        media_30d: >
          {{ states('sensor.bomba_corrente_media_30d') | float(0) | round(3) }}
        crescimento_pct: >
          {% set media_7d = states('sensor.bomba_corrente_media_7d') | float(0) %}
          {% set media_30d = states('sensor.bomba_corrente_media_30d') | float(0) %}
          {% if media_30d > 0 %}
            {{ ((media_7d - media_30d) / media_30d * 100) | round(1) }}%
          {% else %}
            N/A
          {% endif %}
        margem_critico_pct: >
          {% set media_7d = states('sensor.bomba_corrente_media_7d') | float(0) %}
          {% set max_corrente = states('input_number.pump_current_normal_max') | float(0.323) %}
          {% if max_corrente > 0 %}
            {{ ((max_corrente - media_7d) / max_corrente * 100) | round(1) }}%
          {% else %}
            N/A
          {% endif %}

    # ================================================
    # Bomba Funcionando (baseado em CORRENTE)
    # ================================================
    - name: "Bomba Funcionando"
      unique_id: bomba_funcionando
      device_class: running
      state: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
        {{ corrente >= min_corrente }}
      icon: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
        {% if corrente >= min_corrente %}
          mdi:pump
        {% else %}
          mdi:pump-off
        {% endif %}

    # ================================================
    # Fluxo Água Quente
    # ================================================
    - name: "Fluxo Água Quente"
      unique_id: fluxo_agua_quente
      device_class: opening
      state: "{{ states('valve.hot_water') == 'open' }}"
      icon: >
        {% if states('valve.hot_water') == 'open' %}
          mdi:water
        {% else %}
          mdi:water-off
        {% endif %}

    # ================================================
    # CAMADA 3a: Corrente Anormal (v3.5 - usa estabilização)
    # ================================================
    # Só dispara se: estabilizado E (fora_faixa OU mudança_rápida)
    # Isso ignora inrush automaticamente!
    - name: "Bomba Corrente Anormal"
      unique_id: bomba_corrente_anormal
      device_class: problem
      state: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
        {% set max_corrente = states('input_number.pump_current_normal_max') | float(0.323) %}
        {% set pump_on = states('switch.bomba_de_circulacao_de_agua_quente') == 'on' %}
        {% set estabilizada = is_state('binary_sensor.bomba_corrente_estabilizada', 'on') %}
        {% set mudanca_rapida = is_state('binary_sensor.bomba_mudanca_rapida_corrente', 'on') %}
        {% set fora_faixa = corrente < min_corrente or corrente > max_corrente %}
        
        {{ pump_on and (estabilizada and fora_faixa) or mudanca_rapida }}
      icon: >
        {% if is_state('binary_sensor.bomba_corrente_anormal', 'on') %}
          mdi:flash-alert
        {% else %}
          mdi:flash
        {% endif %}
      attributes:
        corrente_atual: >
          {{ states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) | round(3) }}
        faixa_normal: >
          {{ states('input_number.pump_current_normal_min') }}-{{ states('input_number.pump_current_normal_max') }}A
        estabilizada: >
          {{ is_state('binary_sensor.bomba_corrente_estabilizada', 'on') }}
        mudanca_rapida: >
          {{ is_state('binary_sensor.bomba_mudanca_rapida_corrente', 'on') }}
        motivo: >
          {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
          {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
          {% set max_corrente = states('input_number.pump_current_normal_max') | float(0.323) %}
          {% set mudanca_rapida = is_state('binary_sensor.bomba_mudanca_rapida_corrente', 'on') %}
          {% if mudanca_rapida %}
            Mudança rápida detectada
          {% elif corrente < min_corrente %}
            Corrente baixa ({{ corrente | round(3) }}A < {{ min_corrente }}A)
          {% elif corrente > max_corrente %}
            Corrente alta ({{ corrente | round(3) }}A > {{ max_corrente }}A)
          {% else %}
            Normal
          {% endif %}

    # ================================================
    # CAMADA 3b: Corrente CRÍTICA (SEM delay - emergência)
    # ================================================
    # Desliga bomba imediatamente se corrente > crítico
    - name: "Bomba Corrente Crítica"
      unique_id: bomba_corrente_critica
      device_class: safety
      state: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set critical_max = states('input_number.pump_current_critical_max') | float(0.388) %}
        {% set pump_on = states('switch.bomba_de_circulacao_de_agua_quente') == 'on' %}

        {{ pump_on and corrente > critical_max }}
      icon: >
        {% if is_state('binary_sensor.bomba_corrente_critica', 'on') %}
          mdi:alert-octagon
        {% else %}
          mdi:shield-check
        {% endif %}
      attributes:
        corrente_atual: >
          {{ states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) | round(3) }}
        limite_critico: >
          {{ states('input_number.pump_current_critical_max') | float(0.388) }}A
