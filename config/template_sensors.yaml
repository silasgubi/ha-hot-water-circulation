# ════════════════════════════════════════════════════════════════════════════════
# HOT WATER CIRCULATION PUMP — AUTOMATION SYSTEM v3.5.2 DERIVATIVE
# ════════════════════════════════════════════════════════════════════════════════
# Architecture v3.5.2: Derivative (dI/dt) with anti-inrush filter + hysteresis
# Calibrated thresholds from 1826 samples (December 2024, 99.8% coverage)
# - Normal range:      0.303–0.323A
# - Critical:          0.388A (max × 1.15)
# - Stabilization:     |dI/dt| < 0.005 A/s for 2s
# - Rapid change:      |dI/dt| > 0.025 A/s (P97, ignores first 10s after startup)

- sensor:
    # Pump status derived from CURRENT (not switch state)
    - name: "Bomba Status"
      unique_id: bomba_status
      state: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
        {% if corrente >= min_corrente %}
          Funcionando
        {% elif states('switch.bomba_de_circulacao_de_agua_quente') == 'on' %}
          Ligada sem carga
        {% else %}
          Desligada
        {% endif %}
      icon: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
        {% if corrente >= min_corrente %}
          mdi:pump
        {% elif states('switch.bomba_de_circulacao_de_agua_quente') == 'on' %}
          mdi:pump-off
        {% else %}
          mdi:pump-off
        {% endif %}

    # Simplified system status for dashboard header
    - name: "Bomba Sistema Status"
      unique_id: bomba_sistema_status
      state: >
        {% set override = states('input_boolean.pump_manual_override') %}
        {% set pump_on = states('switch.bomba_de_circulacao_de_agua_quente') %}
        {% set timeout_active = states('timer.pump_safety_timeout') %}

        {% if override == 'on' %}
          Manual
        {% elif timeout_active == 'active' and pump_on == 'on' %}
          Funcionando
        {% elif pump_on == 'on' %}
          Ativo
        {% else %}
          Standby
        {% endif %}
      icon: mdi:information-outline

    # Daily runtime is handled by history_stats in sensors.yaml (not a template sensor)

    # ================================================
    # Current Under Load (v3.7.0)
    # ================================================
    # Mirrors pump current ONLY while stabilized (running, past inrush).
    # Goes unavailable otherwise, so Statistics 7d/30d means measure motor
    # health instead of duty cycle (idle 0A samples diluted the old means).
    - name: "Bomba Corrente Sob Carga"
      unique_id: bomba_corrente_sob_carga
      unit_of_measurement: "A"
      device_class: current
      state_class: measurement
      availability: "{{ is_state('binary_sensor.bomba_corrente_estabilizada', 'on') }}"
      state: "{{ states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) }}"

- binary_sensor:
    # ================================================
    # LAYER 2a: Current Stabilized (v3.5)
    # ================================================
    # True when current rate of change is small enough to indicate inrush has passed.
    # |dI/dt| < 0.005 A/s for 2 consecutive seconds = stabilized
    - name: "Bomba Corrente Estabilizada"
      unique_id: bomba_corrente_estabilizada
      device_class: running
      delay_on: "00:00:02"   # must hold stable for 2s before confirming
      state: >
        {% set taxa = states('sensor.bomba_taxa_mudanca_corrente') | float(0) %}
        {% set pump_on = states('switch.bomba_de_circulacao_de_agua_quente') == 'on' %}
        {% set threshold_estabilizacao = 0.005 %}
        {{ pump_on and (taxa | abs) < threshold_estabilizacao }}
      icon: >
        {% if is_state('binary_sensor.bomba_corrente_estabilizada', 'on') %}
          mdi:sine-wave
        {% else %}
          mdi:wave
        {% endif %}
      attributes:
        taxa_atual: >
          {{ states('sensor.bomba_taxa_mudanca_corrente') | float(0) | round(4) }}
        threshold_estabilizacao: "0.005 A/s"
        status: >
          {% set taxa = states('sensor.bomba_taxa_mudanca_corrente') | float(0) %}
          {% if (taxa | abs) < 0.005 %}
            Estável
          {% elif (taxa | abs) < 0.010 %}
            Variando
          {% else %}
            Mudança rápida
          {% endif %}

    # ================================================
    # LAYER 2b: Rapid Current Change (v3.5.2)
    # ================================================
    # Detects sharp current spikes that indicate acute problems (not normal inrush).
    # |dI/dt| > 0.025 A/s = rapid change (P97 threshold)
    # Anti-inrush filter: ignores first 10s after pump activation
    # Hysteresis: delay_on=3s (confirm), delay_off=5s (stabilize before clearing)
    - name: "Bomba Mudança Rápida Corrente"
      unique_id: bomba_mudanca_rapida_corrente
      device_class: problem
      delay_on: "00:00:03"
      delay_off: "00:00:05"
      state: >
        {% set dI = states('sensor.bomba_taxa_mudanca_corrente') | float(0) | abs %}
        {% set bomba_on = is_state('switch.bomba_de_circulacao_de_agua_quente', 'on') %}
        {% set tempo_ligada = (now() - states.switch.bomba_de_circulacao_de_agua_quente.last_changed).total_seconds() %}
        {% set threshold = 0.025 %}
        {{ bomba_on and tempo_ligada > 10 and dI > threshold }}
      icon: >
        {% if is_state('binary_sensor.bomba_mudanca_rapida_corrente', 'on') %}
          mdi:lightning-bolt
        {% else %}
          mdi:lightning-bolt-outline
        {% endif %}
      attributes:
        taxa_atual: >
          {{ states('sensor.bomba_taxa_mudanca_corrente') | float(0) | round(4) }}
        threshold_mudanca_rapida: "0.025 A/s"
        time_since_activation: "{{ (now() - states.switch.bomba_de_circulacao_de_agua_quente.last_changed).total_seconds() }}"
        inrush_filter_active: "{{ (now() - states.switch.bomba_de_circulacao_de_agua_quente.last_changed).total_seconds() <= 10 }}"
        direcao: >
          {% set taxa = states('sensor.bomba_taxa_mudanca_corrente') | float(0) %}
          {% if taxa > 0.025 %}
            Subindo ↑
          {% elif taxa < -0.025 %}
            Descendo ↓
          {% else %}
            Estável →
          {% endif %}

    # ================================================
    # LAYER 2c: Emerging Wear (v3.5)
    # ================================================
    # Detects progressive wear trend: 7d average rising compared to 30d baseline.
    # Triggers when: 7d avg > 30d avg × 1.03 OR 7d avg > normal_max × 0.95
    - name: "Bomba Desgaste Emergente"
      unique_id: bomba_desgaste_emergente
      device_class: problem
      state: >
        {% set media_7d = states('sensor.bomba_corrente_media_7d') | float(0) %}
        {% set media_30d = states('sensor.bomba_corrente_media_30d') | float(0) %}
        {% set max_corrente = states('input_number.pump_current_normal_max') | float(0.323) %}
        {% set crescimento_threshold = 1.03 %}
        {% set margem_critico = 0.95 %}

        {% if media_30d > 0 %}
          {{ media_7d > (media_30d * crescimento_threshold) or media_7d > (max_corrente * margem_critico) }}
        {% else %}
          false
        {% endif %}
      icon: >
        {% if is_state('binary_sensor.bomba_desgaste_emergente', 'on') %}
          mdi:trending-up
        {% else %}
          mdi:trending-neutral
        {% endif %}
      attributes:
        media_7d: >
          {{ states('sensor.bomba_corrente_media_7d') | float(0) | round(3) }}
        media_30d: >
          {{ states('sensor.bomba_corrente_media_30d') | float(0) | round(3) }}
        crescimento_pct: >
          {% set media_7d = states('sensor.bomba_corrente_media_7d') | float(0) %}
          {% set media_30d = states('sensor.bomba_corrente_media_30d') | float(0) %}
          {% if media_30d > 0 %}
            {{ ((media_7d - media_30d) / media_30d * 100) | round(1) }}%
          {% else %}
            N/A
          {% endif %}
        margem_critico_pct: >
          {% set media_7d = states('sensor.bomba_corrente_media_7d') | float(0) %}
          {% set max_corrente = states('input_number.pump_current_normal_max') | float(0.323) %}
          {% if max_corrente > 0 %}
            {{ ((max_corrente - media_7d) / max_corrente * 100) | round(1) }}%
          {% else %}
            N/A
          {% endif %}

    # ================================================
    # Pump Running (derived from CURRENT, not switch)
    # ================================================
    - name: "Bomba Funcionando"
      unique_id: bomba_funcionando
      device_class: running
      state: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
        {{ corrente >= min_corrente }}
      icon: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
        {% if corrente >= min_corrente %}
          mdi:pump
        {% else %}
          mdi:pump-off
        {% endif %}

    # ================================================
    # Hot Water Flow (Sonoff Mini valve state)
    # ================================================
    - name: "Fluxo Água Quente"
      unique_id: fluxo_agua_quente
      device_class: opening
      state: "{{ states('valve.hot_water') == 'open' }}"
      icon: >
        {% if states('valve.hot_water') == 'open' %}
          mdi:water
        {% else %}
          mdi:water-off
        {% endif %}

    # ================================================
    # LAYER 3a: Abnormal Current (v3.5 — uses stabilization guard)
    # ================================================
    # Only fires when: stabilized AND (out_of_range OR rapid_change)
    # This automatically ignores inrush — no need for a separate delay.
    - name: "Bomba Corrente Anormal"
      unique_id: bomba_corrente_anormal
      device_class: problem
      state: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
        {% set max_corrente = states('input_number.pump_current_normal_max') | float(0.323) %}
        {% set pump_on = states('switch.bomba_de_circulacao_de_agua_quente') == 'on' %}
        {% set estabilizada = is_state('binary_sensor.bomba_corrente_estabilizada', 'on') %}
        {% set mudanca_rapida = is_state('binary_sensor.bomba_mudanca_rapida_corrente', 'on') %}
        {% set fora_faixa = corrente < min_corrente or corrente > max_corrente %}

        {{ pump_on and (estabilizada and fora_faixa) or mudanca_rapida }}
      icon: >
        {% if is_state('binary_sensor.bomba_corrente_anormal', 'on') %}
          mdi:flash-alert
        {% else %}
          mdi:flash
        {% endif %}
      attributes:
        corrente_atual: >
          {{ states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) | round(3) }}
        faixa_normal: >
          {{ states('input_number.pump_current_normal_min') }}-{{ states('input_number.pump_current_normal_max') }}A
        estabilizada: >
          {{ is_state('binary_sensor.bomba_corrente_estabilizada', 'on') }}
        mudanca_rapida: >
          {{ is_state('binary_sensor.bomba_mudanca_rapida_corrente', 'on') }}
        motivo: >
          {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
          {% set min_corrente = states('input_number.pump_current_normal_min') | float(0.303) %}
          {% set max_corrente = states('input_number.pump_current_normal_max') | float(0.323) %}
          {% set mudanca_rapida = is_state('binary_sensor.bomba_mudanca_rapida_corrente', 'on') %}
          {% if mudanca_rapida %}
            Mudança rápida detectada
          {% elif corrente < min_corrente %}
            Corrente baixa ({{ corrente | round(3) }}A < {{ min_corrente }}A)
          {% elif corrente > max_corrente %}
            Corrente alta ({{ corrente | round(3) }}A > {{ max_corrente }}A)
          {% else %}
            Normal
          {% endif %}

    # ================================================
    # LAYER 3b: CRITICAL Current (no delay — emergency)
    # ================================================
    # Triggers immediate pump shutoff when current exceeds the critical threshold.
    # No delay_on intentional: emergencies must react instantly.
    - name: "Bomba Corrente Crítica"
      unique_id: bomba_corrente_critica
      device_class: safety
      state: >
        {% set corrente = states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) %}
        {% set critical_max = states('input_number.pump_current_critical_max') | float(0.388) %}
        {% set pump_on = states('switch.bomba_de_circulacao_de_agua_quente') == 'on' %}

        {{ pump_on and corrente > critical_max }}
      icon: >
        {% if is_state('binary_sensor.bomba_corrente_critica', 'on') %}
          mdi:alert-octagon
        {% else %}
          mdi:shield-check
        {% endif %}
      attributes:
        corrente_atual: >
          {{ states('sensor.bomba_de_circulacao_de_agua_quente_corrente') | float(0) | round(3) }}
        limite_critico: >
          {{ states('input_number.pump_current_critical_max') | float(0.388) }}A

    # ================================================
    # LAYER 2d: Circulation Failure by Temperature (v3.6.0)
    # ================================================
    # Detects silent failure: pump commanded ON but water temperature doesn't rise.
    # Main cause: Zigbee radio fails to initialize → command sent, relay doesn't fire.
    # Sensor: sonoff_1000bcbe07_temperature (pipe after pump)
    # Logic: (pump_on OR valve_open) AND temp < min_temp → persists 2 min → alert
    # delay_on 2min: normal temp rise takes <1min; 2min covers inrush + pipe fill.
    - name: "Bomba Falha Circulação"
      unique_id: bomba_falha_circulacao
      device_class: problem
      delay_on: "00:02:00"    # only fires if condition holds for 2 continuous minutes
      delay_off: "00:01:00"
      # v3.7.0: if the temp sensor drops out, float(0) would read as 0°C and
      # raise a false "Zigbee failure" alarm — go unavailable instead.
      availability: "{{ has_value('sensor.sonoff_1000bcbe07_temperature') }}"
      state: >
        {% set pump_on = is_state('switch.bomba_de_circulacao_de_agua_quente', 'on') %}
        {% set valve_open = is_state('valve.hot_water', 'open') %}
        {% set temp = states('sensor.sonoff_1000bcbe07_temperature') | float(0) %}
        {% set min_temp = states('input_number.bomba_temp_funcionamento_minima') | float(32) %}
        {{ (pump_on or valve_open) and temp < min_temp }}
      icon: >
        {% if is_state('binary_sensor.bomba_falha_circulacao', 'on') %}
          mdi:thermometer-alert
        {% else %}
          mdi:thermometer-check
        {% endif %}
      attributes:
        temperatura_atual: >
          {{ states('sensor.sonoff_1000bcbe07_temperature') | float(0) | round(1) }}
        temperatura_minima: >
          {{ states('input_number.bomba_temp_funcionamento_minima') | float(32) }}
        taxa_mudanca: >
          {{ states('sensor.bomba_taxa_mudanca_temperatura') | float(0) | round(2) }}
        bomba_ligada: >
          {{ is_state('switch.bomba_de_circulacao_de_agua_quente', 'on') }}
        valvula_aberta: >
          {{ is_state('valve.hot_water', 'open') }}
