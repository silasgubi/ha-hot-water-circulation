# ════════════════════════════════════════════════
# DEBUG MODE
# ════════════════════════════════════════════════
# This input_boolean controls the visibility of the DEBUG section in the
# Mushroom dashboard. If it doesn't exist, the DEBUG section is always visible.
# Set to OFF to hide it during normal daily use.

input_boolean:
  pump_debug_mode:
    name: Modo Debug da Bomba
    icon: mdi:bug
    initial: off  # set to off to hide the DEBUG section by default

# ════════════════════════════════════════════════
# HOW TO ADD THIS HELPER
# ════════════════════════════════════════════════

# Option 1: Via configuration.yaml
# ---------------------------------
# Copy the input_boolean block above into your configuration.yaml:
#
# input_boolean:
#   pump_debug_mode:
#     name: Pump Debug Mode
#     icon: mdi:bug
#     initial: off

# Option 2: Via UI (recommended)
# --------------------------------
# 1. Settings → Devices & Services → Helpers
# 2. Click + CREATE HELPER
# 3. Select "Toggle"
# 4. Fill in:
#    - Name: Pump Debug Mode
#    - Entity ID: pump_debug_mode
#    - Icon: mdi:bug
# 5. Save

# ════════════════════════════════════════════════
# BEHAVIOR
# ════════════════════════════════════════════════

# pump_debug_mode = ON:
#   DEBUG section is VISIBLE
#   Shows timers, automations, advanced diagnostic controls
#   Use during troubleshooting

# pump_debug_mode = OFF:
#   DEBUG section is HIDDEN
#   Cleaner dashboard focused on essential info
#   Recommended for daily use

# pump_debug_mode does not exist:
#   DEBUG section is ALWAYS VISIBLE (default behavior)

# ════════════════════════════════════════════════
# DASHBOARD TOGGLE SNIPPET
# ════════════════════════════════════════════════

# Add this card to your dashboard to toggle debug mode from the UI:
#
# - type: entity
#   entity: input_boolean.pump_debug_mode
#   name: Debug Mode
#   icon: mdi:bug
#
# Or as a button:
#
# - type: button
#   entity: input_boolean.pump_debug_mode
#   name: Debug
#   icon: mdi:bug
#   tap_action:
#     action: toggle

# ════════════════════════════════════════════════
# REMOVING THE DEBUG SECTION ENTIRELY
# ════════════════════════════════════════════════

# If you don't want the DEBUG section at all:
# 1. Open config/lovelace_bomba_sidebar.yaml
# 2. Find SECTION 8: DEBUG
# 3. Delete the entire conditional block
# 4. Save and reload the dashboard

# Note: the native dashboard (lovelace_bomba_sidebar_native.yaml) does not use
# a conditional — the DEBUG section is always visible. Remove it manually if needed.
