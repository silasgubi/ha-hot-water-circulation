                  Agende manutenÃ§Ã£o preventiva nos prÃ³ximos 7 dias.
                volume_type: default
              action: script.nabu_speak
            
            - service: persistent_notification.create
              data:
                title: "ðŸš¨ Desgaste Progressivo CRÃTICO"
