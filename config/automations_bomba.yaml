- id: bomba_agua_quente_controle_principal
  alias: "Bomba Água Quente - Controle Principal"
  description: "Automatically controls pump activation based on flow detection"
  mode: restart

  trigger:
    - platform: state
      entity_id: valve.hot_water
      to: "open"
      id: fluxo_aberto

    - platform: state
      entity_id: valve.hot_water
      to: "closed"
      id: fluxo_fechado

    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.pump_activation_delay
      id: timer_ligar_terminou

    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.pump_deactivation_delay
      id: timer_desligar_terminou

  condition:
    - condition: state
      entity_id: input_boolean.pump_manual_override
      state: "off"

  action:
    - choose:
        # FLUXO ABERTO
        - conditions:
            - condition: trigger
              id: fluxo_aberto
          sequence:
            - service: timer.cancel
              target:
                entity_id: timer.pump_deactivation_delay

            - service: timer.start
              target:
                entity_id: timer.pump_activation_delay
              data:
                duration: "{{ states('input_number.pump_activation_delay_seconds') | int }}"

            - service: logbook.log
              data:
                name: "💧 Fluxo Detectado"
                message: "Aguardando {{ states('input_number.pump_activation_delay_seconds') }}s para confirmar"

        # TIMER LIGAR TERMINOU
        - conditions:
            - condition: trigger
              id: timer_ligar_terminou
            - condition: state
              entity_id: valve.hot_water
              state: "open"
            - condition: state
              entity_id: switch.bomba_de_circulacao_de_agua_quente
              state: "off"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.bomba_de_circulacao_de_agua_quente

            - service: timer.start
              target:
                entity_id: timer.pump_safety_timeout
              data:
                duration: "{{ (states('input_number.pump_timeout_minutes') | int * 60) }}"

            - service: logbook.log
              data:
                name: "✅ Bomba Ativada"
                message: "Timeout: {{ states('input_number.pump_timeout_minutes') }}min"

        # FLUXO FECHADO
        - conditions:
            - condition: trigger
              id: fluxo_fechado
            - condition: state
              entity_id: switch.bomba_de_circulacao_de_agua_quente
              state: "on"
          sequence:
            - service: timer.cancel
              target:
                entity_id: timer.pump_activation_delay

            - service: timer.start
              target:
                entity_id: timer.pump_deactivation_delay
              data:
                duration: "{{ states('input_number.pump_deactivation_delay_seconds') | int }}"

            - service: logbook.log
              data:
                name: "🚰 Fluxo Fechado"
                message: "Aguardando {{ states('input_number.pump_deactivation_delay_seconds') }}s para desligar"

        # TIMER DESLIGAR TERMINOU
        - conditions:
            - condition: trigger
              id: timer_desligar_terminou
            - condition: state
              entity_id: valve.hot_water
              state: "closed"
            - condition: state
              entity_id: switch.bomba_de_circulacao_de_agua_quente
              state: "on"
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.bomba_de_circulacao_de_agua_quente

            - service: timer.cancel
              target:
                entity_id: timer.pump_safety_timeout

            - service: logbook.log
              data:
                name: "ℹ️ Bomba Desativada"
                message: "Ciclo completo"

# ================================================
# 2. SAFETY TIMEOUT (v3.0 with TTS)
# ================================================
- id: bomba_timeout_seguranca
  alias: "Bomba - Timeout Segurança"
  description: "Automatically shuts off pump after safety timeout with TTS alert"
  mode: single

  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.pump_safety_timeout

  action:
    - service: switch.turn_off
      target:
        entity_id: switch.bomba_de_circulacao_de_agua_quente

    - service: counter.increment
      target:
        entity_id: counter.pump_timeout_events

    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.pump_last_timeout
      data:
        datetime: "{{ now().isoformat() }}"

    - service: system_log.write
      data:
        message: >
          ⚠️ TIMEOUT SEGURANÇA - Bomba Água Quente |
          Desligada após {{ states('input_number.pump_timeout_minutes') }}min |
          Total timeouts: {{ states('counter.pump_timeout_events') }}
        level: warning

    - condition: state
      entity_id: input_boolean.pump_alerts_enabled
      state: "on"

    - data:
        message: >
          Atenção! Bomba desligada por segurança após {{ states('input_number.pump_timeout_minutes') }} minutos.
          Verifique se há vazamento ou torneira aberta.
        volume_type: default
      action: script.nabu_speak

    - service: persistent_notification.create
      data:
        title: "⚠️ Timeout Segurança"
        message: >
          Bomba desligada automaticamente após {{ states('input_number.pump_timeout_minutes') }}min.

          Verifique:
          • Vazamento
          • Torneira aberta
          • Sistema

          Horário: {{ now().strftime('%H:%M:%S') }}
        notification_id: pump_timeout

# ================================================
# 3. MANUAL CONTROL (v3.0)
# ================================================
- id: bomba_controle_manual
  alias: "Bomba - Controle Manual"
  description: "Manual override of the automatic system"
  mode: restart

  trigger:
    - platform: state
      entity_id: input_boolean.pump_manual_control
      to: "on"
      id: manual_on

    - platform: state
      entity_id: input_boolean.pump_manual_control
      to: "off"
      id: manual_off

  condition:
    - condition: state
      entity_id: input_boolean.pump_manual_override
      state: "on"

  action:
    - choose:
        - conditions:
            - condition: trigger
              id: manual_on
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.bomba_de_circulacao_de_agua_quente

            - service: timer.start
              target:
                entity_id: timer.pump_safety_timeout
              data:
                duration: "{{ (states('input_number.pump_timeout_minutes') | int * 60) }}"

            - service: logbook.log
              data:
                name: "🔧 Controle Manual ON"
                message: "Bomba ligada manualmente"

        - conditions:
            - condition: trigger
              id: manual_off
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.bomba_de_circulacao_de_agua_quente

            - service: timer.cancel
              target:
                entity_id: timer.pump_safety_timeout

            - service: logbook.log
              data:
                name: "🔧 Controle Manual OFF"
                message: "Bomba desligada manualmente"

# ================================================
# 4. CRITICAL CURRENT EMERGENCY SHUTOFF (v3.0)
# ================================================
- id: bomba_desligamento_seguranca_corrente
  alias: "Bomba - Desligamento Segurança Corrente Crítica"
  description: "Immediately shuts off pump on critical current — no delay (emergency)"
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.bomba_corrente_critica
      to: "on"

  action:
    - service: switch.turn_off
      target:
        entity_id: switch.bomba_de_circulacao_de_agua_quente

    - service: timer.cancel
      target:
        entity_id:
          - timer.pump_activation_delay
          - timer.pump_deactivation_delay
          - timer.pump_safety_timeout

    - service: system_log.write
      data:
        message: >
          🔴 CORRENTE CRÍTICA - DESLIGAMENTO EMERGÊNCIA |
          Corrente: {{ state_attr('binary_sensor.bomba_corrente_critica', 'corrente_atual') }}A |
          Crítico: {{ state_attr('binary_sensor.bomba_corrente_critica', 'limite_critico') }}A |
          BOMBA DESLIGADA AUTOMATICAMENTE
        level: error

    - condition: state
      entity_id: input_boolean.pump_alerts_enabled
      state: "on"

    - data:
        message: >
          EMERGÊNCIA! Bomba desligada automaticamente.
          Corrente crítica detectada: {{ state_attr('binary_sensor.bomba_corrente_critica', 'corrente_atual') }} amperes.
          NÃO religue antes de inspeção completa.
        volume_type: default
      action: script.nabu_speak

    - service: persistent_notification.create
      data:
        title: "🔴 CORRENTE CRÍTICA - EMERGÊNCIA"
        message: >
          **BOMBA DESLIGADA AUTOMATICAMENTE**

          • Corrente: {{ state_attr('binary_sensor.bomba_corrente_critica', 'corrente_atual') }}A
          • Limite crítico: {{ state_attr('binary_sensor.bomba_corrente_critica', 'limite_critico') }}A

          **NÃO RELIGAR ANTES DE:**
          1. Inspeção completa do motor
          2. Verificar tubulação
          3. Testar sem carga

          Horário: {{ now().strftime('%H:%M:%S') }}
        notification_id: pump_critical_shutdown

# ================================================
# 5. PROGRESSIVE WEAR DETECTION (v3.0)
# ================================================
- id: bomba_deteccao_desgaste_progressivo
  alias: "Bomba - Detecção Desgaste Progressivo"
  description: "Analyzes 7d vs 30d current trends for predictive maintenance"
  mode: single

  trigger:
    - platform: time
      at: "22:00:00"

  condition:
    - condition: template
      value_template: >
        {{ states('sensor.bomba_corrente_media_7d') not in ['unknown', 'unavailable'] and
           states('sensor.bomba_corrente_media_30d') not in ['unknown', 'unavailable'] }}

  action:
    - variables:
        corrente_7d: "{{ states('sensor.bomba_corrente_media_7d') | float(0) }}"
        corrente_30d: "{{ states('sensor.bomba_corrente_media_30d') | float(0) }}"
        crescimento_pct: "{{ ((corrente_7d - corrente_30d) / corrente_30d * 100) | round(1) if corrente_30d > 0 else 0 }}"
        normal_max: "{{ states('input_number.pump_current_normal_max') | float(0.323) }}"
        margem_pct: "{{ ((normal_max - corrente_7d) / normal_max * 100) | round(1) if normal_max > 0 else 0 }}"

    - choose:
        # CRÍTICO: Crescimento >3%
        - conditions:
            - condition: template
              value_template: "{{ crescimento_pct > 3 }}"
          sequence:
            - service: system_log.write
              data:
                message: >
                  🚨 DESGASTE PROGRESSIVO CRÍTICO - Bomba Água Quente |
                  Crescimento: +{{ crescimento_pct }}% (7d vs 30d) |
                  7d: {{ corrente_7d }}A | 30d: {{ corrente_30d }}A |
                  MANUTENÇÃO URGENTE RECOMENDADA
                level: warning

            - condition: state
              entity_id: input_boolean.pump_alerts_enabled
              state: "on"

            - data:
                message: >
                  Atenção! Desgaste progressivo crítico detectado na bomba.
                  Crescimento de {{ crescimento_pct }} por cento na última semana.
                  Agende manutenção preventiva nos próximos 7 dias.
                volume_type: default
              action: script.nabu_speak

            - service: persistent_notification.create
              data:
                title: "🚨 Desgaste Progressivo CRÍTICO"
                message: >
                  **CRESCIMENTO ANORMAL DETECTADO**

                  • Crescimento: +{{ crescimento_pct }}%
                  • Média 7d: {{ corrente_7d }}A
                  • Baseline 30d: {{ corrente_30d }}A

                  **AÇÃO:** Manutenção preventiva em 7 dias
                notification_id: pump_progressive_wear_critical

        # PREVENTIVO: Margem <10%
        - conditions:
            - condition: template
              value_template: "{{ margem_pct < 10 }}"
          sequence:
            - service: system_log.write
              data:
                message: >
                  ⚠️ DESGASTE PROGRESSIVO PREVENTIVO - Bomba Água Quente |
                  Margem crítico: {{ margem_pct }}% |
                  Corrente 7d: {{ corrente_7d }}A | Normal max: {{ normal_max }}A |
                  PLANEJAR MANUTENÇÃO
                level: warning

            - condition: state
              entity_id: input_boolean.pump_alerts_enabled
              state: "on"

            - service: persistent_notification.create
              data:
                title: "⚠️ Desgaste Progressivo - Preventivo"
                message: >
                  **MARGEM DE SEGURANÇA REDUZIDA**

                  • Corrente 7d: {{ corrente_7d }}A
                  • Normal max: {{ normal_max }}A
                  • Margem: {{ margem_pct }}%

                  **AÇÃO:** Planejar manutenção nos próximos 30 dias
                notification_id: pump_progressive_wear_preventive

# ================================================
# 6. RAPID CHANGE ALERT (Derivative) — v3.5.2
# ================================================
# v3.5.2: Threshold 0.025 A/s + anti-inrush filter + TTS removed
- id: bomba_alerta_mudanca_rapida
  alias: "Bomba - Alerta Mudança Rápida"
  description: "Current rising too fast — acute problem detection (Derivative v3.5.2)"
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.bomba_mudanca_rapida_corrente
      to: "on"

  condition:
    - condition: state
      entity_id: input_boolean.pump_alerts_enabled
      state: "on"

  action:
    - service: system_log.write
      data:
        message: >
          ⚡ MUDANÇA RÁPIDA - Bomba Água Quente |
          Taxa: {{ state_attr('binary_sensor.bomba_mudanca_rapida_corrente', 'taxa_atual') }}A/s |
          Corrente: {{ states('sensor.bomba_de_circulacao_de_agua_quente_corrente') }}A |
          Threshold: 0.025A/s (após 10s + hysteresis)
        level: info

    - service: logbook.log
      data:
        name: "⚡ MUDANÇA RÁPIDA"
        message: "Taxa de mudança: {{ state_attr('binary_sensor.bomba_mudanca_rapida_corrente', 'taxa_atual') }} A/s"

# ================================================
# 7. EMERGING WEAR ALERT (Statistics) — v3.5.2
# ================================================
# v3.5.2: TTS removed — preventive alert, not urgent
- id: bomba_alerta_desgaste_emergente
  alias: "Bomba - Alerta Desgaste Emergente"
  description: "Growth trend detected via 7d vs 30d comparison (Statistics v3.5.2)"
  mode: single

  trigger:
    - platform: state
      entity_id: binary_sensor.bomba_desgaste_emergente
      to: "on"

  condition:
    - condition: state
      entity_id: input_boolean.pump_alerts_enabled
      state: "on"

  action:
    - service: system_log.write
      data:
        message: >
          📈 DESGASTE EMERGENTE - Bomba Água Quente |
          Média 7d: {{ states('sensor.bomba_corrente_media_7d') }}A |
          Baseline 30d: {{ states('sensor.bomba_corrente_media_30d') }}A |
          Crescimento: {{ state_attr('binary_sensor.bomba_desgaste_emergente', 'crescimento_pct') }}
        level: info

    - service: logbook.log
      data:
        name: "📈 DESGASTE EMERGENTE"
        message: "Média 7d > 30d. Considere inspeção preventiva."
