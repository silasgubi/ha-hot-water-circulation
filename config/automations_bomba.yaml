                  â€¢ MÃ©dia 7d: {{ corrente_7d }}A
                  â€¢ Baseline 30d: {{ corrente_30d }}A
                  
                  **AÃ‡ÃƒO:** ManutenÃ§Ã£o preventiva em 7 dias
                notification_id: pump_progressive_wear_critical
        
        # PREVENTIVO: Margem <10%
        - conditions:
            - condition: template
              value_template: "{{ margem_pct < 10 }}"
          sequence:
            - service: system_log.write
              data:
                message: >
                  âš ï¸ DESGASTE PROGRESSIVO PREVENTIVO - Bomba Ãgua Quente |
                  Margem crÃ­tico: {{ margem_pct }}% |
                  Corrente 7d: {{ corrente_7d }}A | Normal max: {{ normal_max }}A |
                  PLANEJAR MANUTENÃ‡ÃƒO
                level: warning
            
            - condition: state
              entity_id: input_boolean.pump_alerts_enabled
              state: "on"
            
            - service: persistent_notification.create
              data:
                title: "âš ï¸ Desgaste Progressivo - Preventivo"
                message: >
                  **MARGEM DE SEGURANÃ‡A REDUZIDA**
                  
                  â€¢ Corrente 7d: {{ corrente_7d }}A
                  â€¢ Normal max: {{ normal_max }}A
                  â€¢ Margem: {{ margem_pct }}%
                  
