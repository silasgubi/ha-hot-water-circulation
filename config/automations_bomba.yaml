# ================================================
# 6. ALERTA MUDANÇA RÁPIDA (Derivative) - v3.5 CORRIGIDO
# ================================================
# CORREÇÕES: A/min → A/s (derivative usa segundos)
- id: bomba_alerta_mudanca_rapida
  alias: "Bomba - Alerta Mudança Rápida"
  description: "Corrente subindo muito rápido - problema agudo (Derivative v3.5)"
  mode: single
  
  trigger:
    - platform: state
      entity_id: binary_sensor.bomba_mudanca_rapida_corrente
      to: "on"
  
  action:
    - service: system_log.write
      data:
        message: >
          🚨 MUDANÇA RÁPIDA - Bomba Água Quente |
          Taxa: {{ state_attr('binary_sensor.bomba_mudanca_rapida_corrente', 'taxa_atual') }}A/s |
          Corrente: {{ states('sensor.bomba_de_circulacao_de_agua_quente_corrente') }}A |
          PROBLEMA AGUDO DETECTADO
        level: warning
    
    - condition: state
      entity_id: input_boolean.pump_alerts_enabled
      state: "on"
    
    - data:
        message: >
          Atenção! Corrente da bomba subindo rapidamente.
          Taxa de mudança: {{ state_attr('binary_sensor.bomba_mudanca_rapida_corrente', 'taxa_atual') }} amperes por segundo.
          Possível bloqueio ou travamento do motor.
        volume_type: default
      action: script.nabu_speak
    
    - service: persistent_notification.create
      data:
        title: "🚨 Mudança Rápida - Problema Agudo"
        message: >
          **CORRENTE SUBINDO RAPIDAMENTE**
          
          • Taxa: {{ state_attr('binary_sensor.bomba_mudanca_rapida_corrente', 'taxa_atual') }}A/s
          • Corrente: {{ states('sensor.bomba_de_circulacao_de_agua_quente_corrente') }}A
          • Limite: >0.010A/s
          
          **Possíveis causas:**
          • Bloqueio súbito do rotor
          • Travamento de rolamento
          • Obstrução na tubulação
          
          **AÇÃO:** Desligar e inspecionar AGORA
          
          Horário: {{ now().strftime('%H:%M:%S') }}
        notification_id: pump_rapid_change

