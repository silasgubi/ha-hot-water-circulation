- id: bomba_agua_quente_controle_principal
  alias: "Bomba Ãgua Quente - Controle Principal"
  description: "Controla acionamento automÃ¡tico da bomba baseado em detecÃ§Ã£o de fluxo"
  mode: restart
  
  trigger:
    - platform: state
      entity_id: valve.hot_water
      to: "open"
      id: fluxo_aberto
    
    - platform: state
      entity_id: valve.hot_water
      to: "closed"
      id: fluxo_fechado
    
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.pump_activation_delay
      id: timer_ligar_terminou
    
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.pump_deactivation_delay
      id: timer_desligar_terminou
  
  condition:
    - condition: state
      entity_id: input_boolean.pump_manual_override
      state: "off"
  
  action:
    - choose:
        # FLUXO ABERTO
        - conditions:
            - condition: trigger
              id: fluxo_aberto
            - condition: state
              entity_id: timer.pump_anti_cycle_cooldown
              state: "idle"
          sequence:
            - service: timer.cancel
              target:
                entity_id: timer.pump_deactivation_delay
            
            - service: timer.start
              target:
                entity_id: timer.pump_activation_delay
              data:
                duration: "{{ states('input_number.pump_activation_delay_seconds') | int }}"
            
            - service: logbook.log
              data:
                name: "ðŸ’§ Fluxo Detectado"
                message: "Aguardando {{ states('input_number.pump_activation_delay_seconds') }}s para confirmar"
        
        # TIMER LIGAR TERMINOU
        - conditions:
            - condition: trigger
              id: timer_ligar_terminou
            - condition: state
              entity_id: valve.hot_water
              state: "open"
            - condition: state
              entity_id: switch.bomba_de_circulacao_de_agua_quente
              state: "off"
          sequence:
            - service: switch.turn_on
              target:
                entity_id: switch.bomba_de_circulacao_de_agua_quente
            
            - service: timer.start
              target:
                entity_id: timer.pump_safety_timeout
              data:
                duration: "{{ (states('input_number.pump_timeout_minutes') | int * 60) }}"
            
            - service: logbook.log
              data:
                name: "âœ… Bomba Ativada"
                message: "Timeout: {{ states('input_number.pump_timeout_minutes') }}min"
        
        # FLUXO FECHADO
        - conditions:
            - condition: trigger
              id: fluxo_fechado
            - condition: state
              entity_id: switch.bomba_de_circulacao_de_agua_quente
              state: "on"
          sequence:
            - service: timer.cancel
              target:
                entity_id: timer.pump_activation_delay
            
            - service: timer.start
              target:
                entity_id: timer.pump_deactivation_delay
              data:
                duration: "{{ states('input_number.pump_deactivation_delay_seconds') | int }}"
            
            - service: logbook.log
              data:
                name: "ðŸš° Fluxo Fechado"
                message: "Aguardando {{ states('input_number.pump_deactivation_delay_seconds') }}s para desligar"
        
        # TIMER DESLIGAR TERMINOU
        - conditions:
            - condition: trigger
              id: timer_desligar_terminou
            - condition: state
              entity_id: valve.hot_water
              state: "closed"
            - condition: state
              entity_id: switch.bomba_de_circulacao_de_agua_quente
              state: "on"
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.bomba_de_circulacao_de_agua_quente
            
            - service: timer.cancel
              target:
                entity_id: timer.pump_safety_timeout
            
            - service: logbook.log
              data:
                name: "â„¹ï¸ Bomba Desativada"
                message: "Ciclo completo"

# ================================================
# 2. TIMEOUT SEGURANÃ‡A (v3.0 com TTS)
# ================================================
- id: bomba_timeout_seguranca
  alias: "Bomba - Timeout SeguranÃ§a"
  description: "Desliga bomba automaticamente apÃ³s timeout com alerta TTS"
  mode: single
  
  trigger:
    - platform: event
      event_type: timer.finished
      event_data:
        entity_id: timer.pump_safety_timeout
  
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.bomba_de_circulacao_de_agua_quente
    
    - service: counter.increment
      target:
        entity_id: counter.pump_timeout_events
    
    - service: input_datetime.set_datetime
      target:
        entity_id: input_datetime.pump_last_timeout
      data:
        datetime: "{{ now().isoformat() }}"
    
    - service: system_log.write
      data:
        message: >
          âš ï¸ TIMEOUT SEGURANÃ‡A - Bomba Ãgua Quente |
          Desligada apÃ³s {{ states('input_number.pump_timeout_minutes') }}min |
          Total timeouts: {{ states('counter.pump_timeout_events') }}
        level: warning
    
    - condition: state
      entity_id: input_boolean.pump_alerts_enabled
      state: "on"
    
    - data:
        message: >
          AtenÃ§Ã£o! Bomba desligada por seguranÃ§a apÃ³s {{ states('input_number.pump_timeout_minutes') }} minutos.
          Verifique se hÃ¡ vazamento ou torneira aberta.
        volume_type: default
      action: script.nabu_speak
    
    - service: persistent_notification.create
      data:
        title: "âš ï¸ Timeout SeguranÃ§a"
        message: >
          Bomba desligada automaticamente apÃ³s {{ states('input_number.pump_timeout_minutes') }}min.
          
          Verifique:
          â€¢ Vazamento
          â€¢ Torneira aberta
          â€¢ Sistema
          
          HorÃ¡rio: {{ now().strftime('%H:%M:%S') }}
        notification_id: pump_timeout

