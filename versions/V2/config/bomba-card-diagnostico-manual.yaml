type: vertical-stack
cards:
  # ========================================
  # CARD 1: DIAGNÓSTICO AUTOMÁTICO
  # ========================================
  - type: markdown
    title: 🧪 Diagnóstico do Sistema (Atualiza Automaticamente)
    card_mod:
      style: |
        ha-card {
          background: rgba(0, 50, 100, 0.15);
          border: 2px solid rgba(0, 150, 255, 0.3);
        }
    content: >
      {% set power = states('sensor.bomba_de_circulacao_de_agua_quente_potencia') | float(0) %}
      {% set switch_on = is_state('switch.bomba_de_circulacao_de_agua_quente', 'on') %}
      {% set valve_open = is_state('valve.hot_water', 'open') %}
      {% set override = is_state('input_boolean.pump_manual_override', 'on') %}
      {% set funcionando = is_state('binary_sensor.bomba_funcionando', 'on') %}
      {% set modo_seguro = is_state('binary_sensor.bomba_modo_seguro', 'on') %}
      {% set cooldown = states('timer.pump_anti_cycle_cooldown') %}
      {% set ciclos = states('counter.pump_hourly_cycles') | int(0) %}
      {% set max_ciclos = states('input_number.pump_max_hourly_cycles') | int(20) %}
      {% set power_low = states('input_number.pump_power_threshold_low') | float(40) %}
      {% set power_high = states('input_number.pump_power_threshold_high') | float(60) %}
      {% set power_normal_min = states('input_number.pump_power_normal_min') | float(48) %}
      {% set power_normal_max = states('input_number.pump_power_normal_max') | float(53) %}

      ## 📊 STATUS ATUAL

      | Item | Valor |
      |------|-------|
      | **Bomba (Switch)** | {{ '🟢 LIGADA' if switch_on else '🔴 DESLIGADA' }} |
      | **Funcionando (Real)** | {{ '✅ SIM' if funcionando else '⭕ NÃO' }} |
      | **Potência** | **{{ power }}W** |
      | **Fluxo Detectado** | {{ '💧 SIM' if valve_open else '⭕ NÃO' }} |
      | **Ciclos/Hora** | {{ ciclos }}/{{ max_ciclos }} |

      ---

      ## 🎯 DIAGNÓSTICO

      {% if override %}
      ### 🔴 OVERRIDE ATIVO
      Sistema automático **DESABILITADO**. Controle manual ativo.
      
      **Ação:** Desative "Override" para retomar automação.

      {% elif not is_state('automation.bomba_agua_quente_controle_principal', 'on') %}
      ### ⚠️ AUTOMAÇÃO DESLIGADA
      Automação principal está **OFF**.
      
      **Ação:** Habilite `automation.bomba_agua_quente_controle_principal`

      {% elif switch_on %}
        {% if funcionando %}
      ### ✅ FUNCIONANDO NORMALMENTE
      Bomba ligada e consumindo potência adequada.
      
      **Potência:** {{ power }}W (normal: {{ power_normal_min }}-{{ power_normal_max }}W)
      **Válvula:** {{ 'Aberta 💧' if valve_open else 'Fechada (aguardando desligar)' }}
        {% else %}
      ### ⚠️ LIGADA SEM CARGA
      Switch ON mas potência baixa ({{ power }}W < {{ power_low }}W)
      
      **Possíveis causas:**
      - Bomba sem água (ar na tubulação)
      - Problema elétrico
      - Sensor de potência com delay
        {% endif %}

      {% elif valve_open %}
        {% if cooldown == 'active' %}
      ### ⏸️ EM COOLDOWN
      Fluxo detectado mas aguardando cooldown terminar.
      
      **Timer:** {{ state_attr('timer.pump_anti_cycle_cooldown', 'remaining') }}
      **Ação:** Aguarde término do cooldown para novo ciclo.
        {% elif ciclos >= max_ciclos %}
      ### 🚫 LIMITE DE CICLOS ATINGIDO
      Atingiu limite de {{ max_ciclos }} ciclos/hora.
      
      **Reset automático:** próxima hora cheia
      **Ação:** Aguarde ou aumente limite em Configurações
        {% elif not modo_seguro %}
      ### ⚠️ MODO SEGURO BLOQUEADO
      Sistema bloqueou novo ciclo por segurança.
      
      **Verificar:**
      - Limite de ciclos não atingido? {{ ciclos }}/{{ max_ciclos }}
      - Override desativado? {{ 'NÃO ❌' if override else 'SIM ✅' }}
        {% else %}
      ### ⚠️ DEVERIA INICIAR!
      Fluxo detectado, modo seguro OK, mas bomba não ligou.
      
      **Verificar:**
      - Timer activation delay: {{ states('timer.pump_activation_delay') }}
      - Clique "Forçar Trigger" abaixo
        {% endif %}

      {% else %}
      ### 💤 STANDBY
      Sistema em espera. Tudo normal.
      
      **Aguardando:** Abertura de torneira água quente
      **Próximo ciclo:** Disponível (cooldown idle)
      {% endif %}

      ---

      ## ⚡ ANÁLISE DE POTÊNCIA

      {% if switch_on %}
      | Faixa | Threshold | Status |
      |-------|-----------|--------|
      | 🟢 Normal | {{ power_normal_min }}-{{ power_normal_max }}W | {{ '✅ OK' if power_normal_min <= power <= power_normal_max else '⚠️ FORA' }} |
      | 🔴 Alerta Baixo | < {{ power_low }}W | {{ '⚠️ ALERTA' if power < power_low else '✅ OK' }} |
      | 🔴 Alerta Alto | > {{ power_high }}W | {{ '⚠️ ALERTA' if power > power_high else '✅ OK' }} |
      | **Atual** | **{{ power }}W** | {% if power < power_low %}🔴 BAIXA{% elif power > power_high %}🔴 ALTA{% elif power_normal_min <= power <= power_normal_max %}🟢 NORMAL{% else %}🟡 ACEITÁVEL{% endif %} |

      {% if power < power_low %}
      **⚠️ Potência BAIXA:** Possível ar na tubulação ou problema mecânico
      {% elif power > power_high %}
      **⚠️ Potência ALTA:** Possível sobrecarga ou motor sobrecarregado
      {% elif power_normal_min <= power <= power_normal_max %}
      **✅ Potência NORMAL:** Funcionamento dentro do esperado
      {% else %}
      **🟡 Potência ACEITÁVEL:** Fora da faixa ideal mas dentro dos limites
      {% endif %}
      {% else %}
      *Bomba desligada - análise não aplicável*
      {% endif %}

      ---

      ## ⏱️ TIMERS E PROTEÇÕES

      | Timer | Estado | Valor |
      |-------|--------|-------|
      | Activation Delay | {{ states('timer.pump_activation_delay') }} | {{ state_attr('timer.pump_activation_delay', 'duration') }} |
      | Deactivation Delay | {{ states('timer.pump_deactivation_delay') }} | {{ state_attr('timer.pump_deactivation_delay', 'duration') }} |
      | Safety Timeout | {{ states('timer.pump_safety_timeout') }} | {{ state_attr('timer.pump_safety_timeout', 'remaining') or 'idle' }} |
      | Anti-Cycle Cooldown | {{ states('timer.pump_anti_cycle_cooldown') }} | {{ state_attr('timer.pump_anti_cycle_cooldown', 'remaining') or 'idle' }} |

      ---

      ## 🤖 AUTOMAÇÕES

      | Automação | Status |
      |-----------|--------|
      | Controle Principal | {{ '✅' if is_state('automation.bomba_agua_quente_controle_principal', 'on') else '❌' }} {{ states('automation.bomba_agua_quente_controle_principal') }} |
      | Timeout Segurança | {{ '✅' if is_state('automation.bomba_timeout_seguranca', 'on') else '❌' }} {{ states('automation.bomba_timeout_seguranca') }} |
      | Controle Manual | {{ '✅' if is_state('automation.bomba_controle_manual', 'on') else '❌' }} {{ states('automation.bomba_controle_manual') }} |
      | Reset Contador Horário | {{ '✅' if is_state('automation.bomba_reset_contador_horario', 'on') else '❌' }} {{ states('automation.bomba_reset_contador_horario') }} |
      | Reset Contador Diário | {{ '✅' if is_state('automation.bomba_reset_contador_diario', 'on') else '❌' }} {{ states('automation.bomba_reset_contador_diario') }} |

      ---

      ## 📈 ESTATÍSTICAS HOJE

      | Métrica | Valor |
      |---------|-------|
      | Runtime | {{ states('sensor.bomba_runtime_hoje') }}h |
      | Ciclos | {{ states('counter.pump_daily_cycles') }} |
      | Eficiência | {{ states('sensor.bomba_eficiencia') }} min/ciclo |
      | Custo | R$ {{ states('sensor.bomba_custo_hoje') }} |
      | Timeouts | {{ states('counter.pump_timeout_events') }} |
      | Alertas Potência | {{ states('counter.pump_power_alerts') }} |

      ---

      ## 🕐 ÚLTIMOS EVENTOS

      | Evento | Timestamp |
      |--------|-----------|
      | Última Ativação | {{ states('input_datetime.pump_last_activation') }} |
      | Último Timeout | {{ states('input_datetime.pump_last_timeout') or 'Nenhum' }} |

  # ========================================
  # BOTÕES DE AÇÃO RÁPIDA
  # ========================================
  - type: horizontal-stack
    cards:
      - show_name: true
        show_icon: true
        type: button
        name: Forçar Trigger
        icon: mdi:play-circle
        tap_action:
          action: call-service
          service: automation.trigger
          service_data:
            entity_id: automation.bomba_agua_quente_controle_principal
        card_mod:
          style: |
            ha-card {
              background: rgba(255, 152, 0, 0.2);
              border: 1px solid rgba(255, 152, 0, 0.5);
            }
      - type: button
        name: Ver Logs
        icon: mdi:text-box-search
        tap_action:
          action: navigate
          navigation_path: /config/logs
        card_mod:
          style: |
            ha-card {
              background: rgba(33, 150, 243, 0.2);
              border: 1px solid rgba(33, 150, 243, 0.5);
            }
      - type: button
        name: Automações
        icon: mdi:robot
        tap_action:
          action: navigate
          navigation_path: /config/automation
        card_mod:
          style: |
            ha-card {
              background: rgba(156, 39, 176, 0.2);
              border: 1px solid rgba(156, 39, 176, 0.5);
            }
      - show_name: true
        show_icon: true
        type: button
        name: Relatório
        icon: mdi:file-document
        tap_action:
          action: call-service
          service: script.pump_detailed_report
        card_mod:
          style: |
            ha-card {
              background: rgba(76, 175, 80, 0.2);
              border: 1px solid rgba(76, 175, 80, 0.5);
            }

  # ========================================
  # CARD 2: MANUAL REFORMATADO
  # ========================================
  - type: markdown
    title: 📖 Manual do Sistema
    card_mod:
      style: |
        ha-card {
          font-size: 14px;
        }
    content: >
      ## 💧 O que é este Sistema?

      Sistema inteligente que **liga automaticamente** a bomba de circulação quando você abre uma torneira de água quente, garantindo **água quente imediata** e economia de água/energia. A bomba desliga sozinha quando você fecha a torneira.

      ---

      ## 🎮 Botões de Controle

      | Botão | O que faz | Quando usar |
      |-------|-----------|-------------|
      | 🔴 **Override** | Desativa COMPLETAMENTE o automático | Manutenção/emergência |
      | 🔵 **Manual** | Liga/desliga bomba manualmente | Teste (só funciona com Override ON) |
      | 🧪 **Teste** | Executa ciclo completo de teste | Validar funcionamento |
      | ⛔ **Reset** | EMERGÊNCIA - desliga tudo | Bomba travada/problema |

      ---

      ## 📊 O que Mostram os Indicadores

      **Gauge (Medidor Circular):**
      - 🟢 Verde: Potência normal ({{ states('input_number.pump_power_normal_min') }}-{{ states('input_number.pump_power_normal_max') }}W)
      - 🟡 Amarelo: Aceitável mas fora do ideal
      - 🔴 Vermelho: Alerta (< {{ states('input_number.pump_power_threshold_low') }}W ou > {{ states('input_number.pump_power_threshold_high') }}W)

      **Cards de Status:**
      - 🔹 **Estado da Bomba**: Funcionando / Ligada sem carga / Desligada
      - 🔹 **Sistema Status**: Manual / Limite próximo / Funcionando / Standby
      - 🔹 **Fluxo de Água**: Se detecta torneira aberta
      - 🔹 **Potência Anormal**: Alerta se consumo fora da faixa configurada

      **Contadores:**
      - 🔸 **Runtime Hoje**: Quantas horas bomba funcionou
      - 🔸 **Ciclos Hoje**: Quantas vezes ligou
      - 🔸 **Custo Hoje**: Gasto em R$ (baseado na tarifa configurada)
      - 🔸 **Ciclos/Hora**: Proteção contra uso excessivo (máx: {{ states('input_number.pump_max_hourly_cycles') }})

      **Proteções Ativas:**
      - 🛡️ **Modo Seguro**: Verde = OK / Vermelho = bloqueado
      - ⏰ **Timer Timeout**: Quanto tempo restante até desligar por segurança
      - ⏸️ **Anti-Cycling**: Tempo de espera entre acionamentos

      ---

      ## 🔄 Como Funciona

      **Ciclo Normal (Automático):**
      ```
      [Abre Torneira] 
           ↓ (aguarda {{ states('input_number.pump_activation_delay_seconds') }}s)
      [Liga Bomba] → [Água Quente Circula!]
           ↓
      [Fecha Torneira]
           ↓ (aguarda {{ states('input_number.pump_deactivation_delay_seconds') }}s)
      [Desliga Bomba]
           ↓ (cooldown {{ states('input_number.pump_cooldown_minutes') }} min)
      [Pronta para Próximo Ciclo]
      ```

      **Por que os Delays?**
      - **Ligar ({{ states('input_number.pump_activation_delay_seconds') }}s):** Confirma que não foi abertura acidental
      - **Desligar ({{ states('input_number.pump_deactivation_delay_seconds') }}s):** Evita religamentos se reabrir torneira rapidamente
      - **Cooldown ({{ states('input_number.pump_cooldown_minutes') }} min):** Protege motor contra liga-desliga frequente

      ---

      ## ⚙️ Configurações Ajustáveis

      **Delays (em segundos):**
      - **Ligar:** {{ states('input_number.pump_activation_delay_seconds') }}s após detectar fluxo
      - **Desligar:** {{ states('input_number.pump_deactivation_delay_seconds') }}s após parar fluxo

      **Proteções (em minutos):**
      - **Timeout:** Desliga após {{ states('input_number.pump_timeout_minutes') }} min contínuos
      - **Cooldown:** Espera {{ states('input_number.pump_cooldown_minutes') }} min entre ciclos

      **Limites Operacionais:**
      - **Ciclos/Hora:** Máximo {{ states('input_number.pump_max_hourly_cycles') }} acionamentos
      - **Runtime/Dia:** Máximo {{ states('input_number.pump_max_daily_runtime') }} horas
      - **Tarifa:** R$ {{ states('input_number.bomba_energy_tariff') }}/kWh

      ---

      ## 📈 Faixas de Potência (Calibradas)

      | Potência (W) | Status | Significado |
      |--------------|--------|-------------|
      | < {{ states('input_number.pump_power_threshold_low') }}W | 🔴 BAIXA | Possível ar na tubulação, entupimento ou problema |
      | {{ states('input_number.pump_power_threshold_low') }}-{{ (states('input_number.pump_power_normal_min') | float - 1) | round(0) }}W | 🟡 ACEITÁVEL | Fora do ideal mas funcional |
      | {{ states('input_number.pump_power_normal_min') }}-{{ states('input_number.pump_power_normal_max') }}W | 🟢 NORMAL | **Faixa ideal** (83% das medições) |
      | {{ (states('input_number.pump_power_normal_max') | float + 1) | round(0) }}-{{ states('input_number.pump_power_threshold_high') }}W | 🟡 ACEITÁVEL | Fora do ideal mas funcional |
      | > {{ states('input_number.pump_power_threshold_high') }}W | 🔴 ALTA | Sobrecarga ou problema no motor |

      **Baseado em 143 medições reais:**
      - Média: 50.8W
      - Mediana: 51W
      - Desvio: ±3.2W

      ---

      ## 🚨 Quando o Sistema Intervém

      | Situação | O que o Sistema Faz | Como Resolver |
      |----------|---------------------|---------------|
      | Bomba ligada > {{ states('input_number.pump_timeout_minutes') }} min | Desliga por timeout | Verificar se torneira foi esquecida aberta |
      | Potência < {{ states('input_number.pump_power_threshold_low') }}W | Alerta potência baixa | Purgar ar da tubulação |
      | Potência > {{ states('input_number.pump_power_threshold_high') }}W | Alerta sobrecarga | Verificar motor e instalação elétrica |
      | Mais de {{ states('input_number.pump_max_hourly_cycles') }} ciclos/hora | Bloqueia novos acionamentos | Aguardar próxima hora ou aumentar limite |
      | Religou < {{ states('input_number.pump_cooldown_minutes') }} min | Aplica cooldown | Aguardar término do timer |
      | Sensor offline/sem resposta | Auto-desliga por segurança | Verificar conexão Zigbee/WiFi |

      ---

      ## 🔧 Troubleshooting Rápido

      ### ❌ Bomba não liga quando abro torneira

      **Verificar (nesta ordem):**
      1. Override está **OFF**? (deve estar desativado)
      2. Atingiu limite de ciclos? ({{ states('counter.pump_hourly_cycles') }}/{{ states('input_number.pump_max_hourly_cycles') }})
      3. Em cooldown? (verificar timer)
      4. Automação principal está **ON**?
      5. Sensor de fluxo detectando? (valve.hot_water)

      **Ações:**
      - Clique "Forçar Trigger" no card de diagnóstico
      - Aguarde {{ states('input_number.pump_activation_delay_seconds') }}s após abrir torneira
      - Verifique logs do sistema

      ### ❌ Bomba não desliga

      **Ações imediatas:**
      1. Clique botão **RESET** (emergência)
      2. Se não resolver, ative **Override** + desligue **Manual**
      3. Verificar estado da válvula (valve.hot_water)
      4. Revisar logs/automações

      ### ⚠️ Potência anormal

      **Potência BAIXA (< {{ states('input_number.pump_power_threshold_low') }}W):**
      - Ar na tubulação → Purgar sistema
      - Válvula fechada → Verificar instalação
      - Entupimento → Limpar tubulação

      **Potência ALTA (> {{ states('input_number.pump_power_threshold_high') }}W):**
      - Motor sobrecarregado → Verificar tensão elétrica
      - Problema mecânico → Manutenção da bomba
      - Instalação incorreta → Revisar fiação

      ### 📊 Contadores não resetam

      **Verificar:**
      - Automações de reset habilitadas?
      - Timezone correto no Home Assistant?
      - Executar reset manual via Services

      ---

      ## 💡 Dicas de Uso

      1. **Ajuste delays conforme sua tubulação** (mais longa = delay maior)
      2. **Configure tarifa correta** para cálculo preciso de custo
      3. **Monitore alertas de potência** para detectar problemas cedo
      4. **Use Override apenas para manutenção** (não deixe ativo)
      5. **Botão Reset é só para emergências** (não use rotineiramente)
      6. **Analise eficiência** (min/ciclo) para otimizar delays
      7. **Verifique relatório diário** (enviado às 22h)

      ---

      ## 📚 Informações Técnicas

      **Hardware:**
      - Sensor: Sonoff Mini (WiFi 2.4GHz)
      - Relé: Tuya TS011F (Zigbee)
      - Bomba: 50W @ 220V

      **Consumo:**
      - Potência nominal: 50W
      - Custo/hora: R$ {{ (0.050 * (states('input_number.bomba_energy_tariff') | float)) | round(3) }}
      - Corrente: ~0.25A

      **Proteções:**
      - Nível 1: Hardware (Tuya 16A)
      - Nível 2: Software (timeouts)
      - Nível 3: Lógica (delays/cooldown)
      - Nível 4: Monitoramento (alertas)

      ---

      **Versão:** 2.0.1 | **Status:** ✅ Produção | **Custo Operacional:** ~R$ 0,043/hora
