# Testes do Sistema - Bomba Água Quente v2.0
# Executar via Developer Tools → Services

# ========================================
# TESTE 1: VERIFICAÇÃO DE HELPERS
# ========================================
# Copiar para Developer Tools → Template

test_1_verificar_helpers: |
  TESTE 1: VERIFICAÇÃO DE HELPERS
  
  {% set required_helpers = [
    'timer.pump_activation_delay',
    'timer.pump_deactivation_delay',
    'timer.pump_safety_timeout',
    'timer.pump_anti_cycle_cooldown',
    'input_boolean.pump_manual_override',
    'input_boolean.pump_manual_control',
    'input_boolean.pump_alerts_enabled',
    'counter.pump_hourly_cycles',
    'counter.pump_daily_cycles',
    'counter.pump_timeout_events',
    'counter.pump_power_alerts',
    'input_datetime.pump_last_activation',
    'input_datetime.pump_last_timeout',
    'input_number.pump_power_threshold_low',
    'input_number.pump_power_threshold_high',
    'input_number.pump_power_normal_min',
    'input_number.pump_power_normal_max',
    'input_number.pump_max_daily_runtime',
    'input_number.pump_max_hourly_cycles',
    'input_number.pump_timeout_minutes',
    'input_number.pump_cooldown_minutes',
    'input_number.pump_activation_delay_seconds',
    'input_number.pump_deactivation_delay_seconds',
    'input_number.bomba_energy_tariff'
  ] %}
  
  {% for helper in required_helpers %}
  {{ loop.index }}. {{ helper }}:
     Estado: {{ states(helper) }}
     Status: {% if states(helper) != 'unknown' %}✅ OK{% else %}❌ FALTANDO{% endif %}
  {% endfor %}
  
  Total: {{ required_helpers | length }} helpers
  Criados: {{ required_helpers | select('is_state', 'unknown') | list | length == 0 }}

# ========================================
# TESTE 2: VERIFICAÇÃO DE SENSORES
# ========================================

test_2_verificar_sensores: |
  TESTE 2: VERIFICAÇÃO DE SENSORES
  
  HARDWARE:
  - valve.hot_water: {{ states('valve.hot_water') }} {% if has_value('valve.hot_water') %}✅{% else %}❌{% endif %}
  - switch.bomba_de_circulacao_de_agua_quente: {{ states('switch.bomba_de_circulacao_de_agua_quente') }} {% if has_value('switch.bomba_de_circulacao_de_agua_quente') %}✅{% else %}❌{% endif %}
  - sensor.bomba_de_circulacao_de_agua_quente_potencia: {{ states('sensor.bomba_de_circulacao_de_agua_quente_potencia') }}W {% if has_value('sensor.bomba_de_circulacao_de_agua_quente_potencia') %}✅{% else %}❌{% endif %}
  
  TEMPLATE SENSORS:
  - sensor.bomba_status: {{ states('sensor.bomba_status') }} {% if has_value('sensor.bomba_status') %}✅{% else %}❌{% endif %}
  - sensor.bomba_sistema_status: {{ states('sensor.bomba_sistema_status') }} {% if has_value('sensor.bomba_sistema_status') %}✅{% else %}❌{% endif %}
  - sensor.bomba_runtime_hoje: {{ states('sensor.bomba_runtime_hoje') }}h {% if has_value('sensor.bomba_runtime_hoje') %}✅{% else %}❌{% endif %}
  - sensor.bomba_eficiencia: {{ states('sensor.bomba_eficiencia') }} min/ciclo {% if has_value('sensor.bomba_eficiencia') %}✅{% else %}❌{% endif %}
  - sensor.bomba_custo_hoje: R$ {{ states('sensor.bomba_custo_hoje') }} {% if has_value('sensor.bomba_custo_hoje') %}✅{% else %}❌{% endif %}
  
  BINARY SENSORS:
  - binary_sensor.bomba_funcionando: {{ states('binary_sensor.bomba_funcionando') }} {% if has_value('binary_sensor.bomba_funcionando') %}✅{% else %}❌{% endif %}
  - binary_sensor.fluxo_agua_quente: {{ states('binary_sensor.fluxo_agua_quente') }} {% if has_value('binary_sensor.fluxo_agua_quente') %}✅{% else %}❌{% endif %}
  - binary_sensor.bomba_modo_seguro: {{ states('binary_sensor.bomba_modo_seguro') }} {% if has_value('binary_sensor.bomba_modo_seguro') %}✅{% else %}❌{% endif %}
  - binary_sensor.bomba_potencia_anormal: {{ states('binary_sensor.bomba_potencia_anormal') }} {% if has_value('binary_sensor.bomba_potencia_anormal') %}✅{% else %}❌{% endif %}
  
  UTILITY METERS:
  - sensor.pump_energy_daily: {{ states('sensor.pump_energy_daily') }} kWh {% if has_value('sensor.pump_energy_daily') %}✅{% else %}❌{% endif %}

# ========================================
# TESTE 3: VERIFICAÇÃO DE AUTOMAÇÕES
# ========================================

test_3_verificar_automacoes: |
  TESTE 3: VERIFICAÇÃO DE AUTOMAÇÕES
  
  {% set automations = [
    'automation.bomba_agua_quente_controle_principal',
    'automation.bomba_timeout_seguranca',
    'automation.bomba_controle_manual',
    'automation.bomba_reset_contador_horario',
    'automation.bomba_reset_contador_diario',
    'automation.bomba_relatorio_diario'
  ] %}
  
  {% for auto in automations %}
  {{ loop.index }}. {{ auto }}:
     Estado: {{ states(auto) }}
     Status: {% if states(auto) == 'on' %}✅ HABILITADA{% elif states(auto) == 'off' %}⚠️ DESABILITADA{% else %}❌ NÃO EXISTE{% endif %}
  {% endfor %}

# ========================================
# TESTE 4: VERIFICAÇÃO DE SCRIPTS
# ========================================

test_4_verificar_scripts: |
  TESTE 4: VERIFICAÇÃO DE SCRIPTS
  
  {% set scripts = [
    'script.pump_system_test',
    'script.pump_emergency_reset',
    'script.pump_detailed_report',
    'script.pump_backup_config'
  ] %}
  
  {% for script in scripts %}
  {{ loop.index }}. {{ script }}: {% if states(script) != 'unknown' %}✅ OK{% else %}❌ FALTANDO{% endif %}
  {% endfor %}

# ========================================
# TESTE 5: DIAGNÓSTICO COMPLETO
# ========================================

