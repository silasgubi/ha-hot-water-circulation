  TESTE 5: DIAGNÓSTICO COMPLETO DO SISTEMA
  Data/Hora: {{ now().strftime('%d/%m/%Y %H:%M:%S') }}
  
  ═══════════════════════════════════════════════
  HARDWARE
  ═══════════════════════════════════════════════
  Fluxo: {{ states('valve.hot_water') }}
  Bomba (switch): {{ states('switch.bomba_de_circulacao_de_agua_quente') }}
  Potência: {{ states('sensor.bomba_de_circulacao_de_agua_quente_potencia') }}W
  
  ═══════════════════════════════════════════════
  STATUS
  ═══════════════════════════════════════════════
  Bomba Status: {{ states('sensor.bomba_status') }}
  Sistema Status: {{ states('sensor.bomba_sistema_status') }}
  Funcionando (real): {{ states('binary_sensor.bomba_funcionando') }}
  Modo Seguro: {{ states('binary_sensor.bomba_modo_seguro') }}
  Potência Anormal: {{ states('binary_sensor.bomba_potencia_anormal') }}
  
  ═══════════════════════════════════════════════
  PROTEÇÕES
  ═══════════════════════════════════════════════
  Override Manual: {{ states('input_boolean.pump_manual_override') }}
  Controle Manual: {{ states('input_boolean.pump_manual_control') }}
  Alertas: {{ states('input_boolean.pump_alerts_enabled') }}
  Ciclos/hora: {{ states('counter.pump_hourly_cycles') }}/{{ states('input_number.pump_max_hourly_cycles') }}
  Ciclos/dia: {{ states('counter.pump_daily_cycles') }}
  Timeout events: {{ states('counter.pump_timeout_events') }}
  Power alerts: {{ states('counter.pump_power_alerts') }}
  
  ═══════════════════════════════════════════════
  TIMERS
  ═══════════════════════════════════════════════
  Activation delay: {{ states('timer.pump_activation_delay') }}
  Deactivation delay: {{ states('timer.pump_deactivation_delay') }}
  Safety timeout: {{ states('timer.pump_safety_timeout') }}
  Cooldown: {{ states('timer.pump_anti_cycle_cooldown') }}
  
  ═══════════════════════════════════════════════
  ESTATÍSTICAS
  ═══════════════════════════════════════════════
  Runtime hoje: {{ states('sensor.bomba_runtime_hoje') }}h
  Eficiência: {{ states('sensor.bomba_eficiencia') }} min/ciclo
  Consumo diário: {{ states('sensor.pump_energy_daily') }} kWh
  Custo hoje: R$ {{ states('sensor.bomba_custo_hoje') }}
  
  ═══════════════════════════════════════════════
  CONFIGURAÇÕES
  ═══════════════════════════════════════════════
  Delay ligar: {{ states('input_number.pump_activation_delay_seconds') }}s
  Delay desligar: {{ states('input_number.pump_deactivation_delay_seconds') }}s
  Timeout: {{ states('input_number.pump_timeout_minutes') }}min
  Cooldown: {{ states('input_number.pump_cooldown_minutes') }}min
  
  ═══════════════════════════════════════════════
  THRESHOLDS POTÊNCIA
  ═══════════════════════════════════════════════
  Normal: {{ states('input_number.pump_power_normal_min') }}-{{ states('input_number.pump_power_normal_max') }}W
  Alerta baixo: <{{ states('input_number.pump_power_threshold_low') }}W
  Alerta alto: >{{ states('input_number.pump_power_threshold_high') }}W
  
  ═══════════════════════════════════════════════
  ÚLTIMOS EVENTOS
  ═══════════════════════════════════════════════
  Última ativação: {{ states('input_datetime.pump_last_activation') }}
  Último timeout: {{ states('input_datetime.pump_last_timeout') }}

# ========================================
# TESTE 6: CENÁRIO - OPERAÇÃO NORMAL
# ========================================
# Executar manualmente passo a passo

test_6_cenario_operacao_normal:
  description: "Teste de operação normal completa"
  steps:
    - step: 1
      action: "Abrir valve.hot_water manualmente"
      expected: "Timer pump_activation_delay inicia (3s)"
      
    - step: 2
      action: "Aguardar timer terminar"
      expected: "Bomba liga automaticamente"
      
    - step: 3
      action: "Verificar potência"
      expected: "Potência entre 48-53W"
      
    - step: 4
      action: "Aguardar 5 segundos"
      expected: "Bomba continua ligada"
      
    - step: 5
      action: "Fechar valve.hot_water manualmente"
      expected: "Timer pump_deactivation_delay inicia (20s)"
      
    - step: 6
      action: "Aguardar timer terminar"
      expected: "Bomba desliga automaticamente"
      
    - step: 7
      action: "Verificar cooldown"
      expected: "Timer pump_anti_cycle_cooldown ativo (3min)"

# ========================================
# TESTE 7: CENÁRIO - TIMEOUT
# ========================================

test_7_cenario_timeout:
  description: "Teste de proteção timeout"
  steps:
    - step: 1
      action: "Ligar bomba manualmente (script.pump_system_test)"
      expected: "Bomba liga"
      
    - step: 2
      action: "Alterar input_number.pump_timeout_minutes para 1"
      expected: "Timeout configurado para 1 minuto"
      
    - step: 3
      action: "Aguardar 1 minuto"
      expected: "Bomba desliga automaticamente"
      
    - step: 4
      action: "Verificar counter.pump_timeout_events"
      expected: "Contador incrementado"
      
    - step: 5
      action: "Restaurar input_number.pump_timeout_minutes para 30"
      expected: "Configuração restaurada"

# ========================================
# TESTE 8: CENÁRIO - LIMITE CICLOS
# ========================================

test_8_cenario_limite_ciclos:
  description: "Teste de limite de ciclos por hora"
  steps:
    - step: 1
      action: "Verificar counter.pump_hourly_cycles"
      expected: "Anotar valor atual"
      
    - step: 2
      action: "Alterar input_number.pump_max_hourly_cycles para valor próximo do atual + 2"
      expected: "Limite ajustado"
      
    - step: 3
      action: "Executar 2 ciclos completos"
      expected: "Ciclos funcionam normalmente"
      
    - step: 4
      action: "Tentar executar mais um ciclo"
      expected: "Sistema bloqueia (limite atingido)"
      
    - step: 5
      action: "Verificar binary_sensor.bomba_modo_seguro"
      expected: "Estado: off"
      
    - step: 6
      action: "Restaurar input_number.pump_max_hourly_cycles para 20"
      expected: "Configuração restaurada"

